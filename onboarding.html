<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>LaroFit — Build My Program</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="appletouchicon.png">
<link rel="stylesheet" href="larofit.css?v=2">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
/* ── FULL DARK LAYOUT — no nav ── */
html, body {
  background: #111111;
  color: #ffffff;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 0;
  display: block;
  overscroll-behavior: none;
}

button, a { touch-action: manipulation; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
.screen.active { display: flex; }

/* ══════════════════════════════════════
   SCREEN 1 — CHAT
══════════════════════════════════════ */
#screen-chat {
  background: #111111;
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 16px 12px;
  padding-top: max(16px, env(safe-area-inset-top));
  border-bottom: 0.5px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}

.chat-header-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--volt);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.chat-header-name {
  font-size: 15px;
  font-weight: 700;
  color: #ffffff;
}

.chat-header-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  font-family: var(--font-mono);
}

/* Progress bar */
.chat-progress {
  height: 2px;
  background: rgba(255,255,255,0.08);
  flex-shrink: 0;
}

.chat-progress-fill {
  height: 100%;
  background: var(--volt);
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.msg {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  animation: msgIn 0.2s ease both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--volt);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-bottom: 2px;
}

.msg-bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
}

.msg.ai .msg-bubble {
  background: #1e1e1e;
  color: #ffffff;
  border-radius: 4px 18px 18px 18px;
}

.msg.user .msg-bubble {
  background: var(--volt);
  color: #1a1a1a;
  font-weight: 600;
  border-radius: 18px 18px 4px 18px;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 12px 14px;
  background: #1e1e1e;
  border-radius: 4px 18px 18px 18px;
  width: fit-content;
}

.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  animation: typingBounce 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-4px); opacity: 1; }
}

/* Quick replies */
.quick-replies {
  padding: 8px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex-shrink: 0;
}

.qr-btn {
  padding: 9px 16px;
  background: #1e1e1e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
  white-space: nowrap;
}

.qr-btn:active { background: rgba(198,241,53,0.15); border-color: var(--volt); color: var(--volt); }
.qr-btn.selected { background: var(--volt); border-color: var(--volt); color: #1a1a1a; font-weight: 700; }

/* Input bar */
.chat-input-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  border-top: 0.5px solid rgba(255,255,255,0.08);
  background: #111111;
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  padding: 11px 14px;
  background: #1e1e1e;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  font-size: 15px;
  color: #ffffff;
  outline: none;
  font-family: var(--font-body);
  transition: border-color 0.2s;
}

.chat-input::placeholder { color: rgba(255,255,255,0.3); }
.chat-input:focus { border-color: rgba(198,241,53,0.4); }

.chat-send-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--volt);
  color: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
  border: none;
}

.chat-send-btn:active { transform: scale(0.92); }
.chat-send-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }

/* ══════════════════════════════════════
   SCREEN 2 — GENERATING
══════════════════════════════════════ */
#screen-generating {
  background: #111111;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 24px;
  padding: 40px 24px;
}

.gen-spinner {
  width: 64px;
  height: 64px;
  border: 3px solid rgba(198,241,53,0.15);
  border-top-color: var(--volt);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.gen-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1px;
  color: #ffffff;
}

.gen-steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 300px;
}

.gen-step {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  text-align: left;
  transition: color 0.4s;
}

.gen-step.done { color: rgba(255,255,255,0.85); }
.gen-step.active { color: var(--volt); }

.gen-step-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  transition: background 0.4s;
}

.gen-step.done .gen-step-icon  { background: var(--volt); color: #1a1a1a; }
.gen-step.active .gen-step-icon { background: rgba(198,241,53,0.2); color: var(--volt); }

/* ══════════════════════════════════════
   SCREEN 3 — PREVIEW
══════════════════════════════════════ */
#screen-preview {
  background: var(--bg);
  flex-direction: column;
}

.preview-header {
  background: var(--bg-dark);
  padding: 20px 16px 16px;
  padding-top: max(20px, env(safe-area-inset-top));
  flex-shrink: 0;
}

.preview-eyebrow {
  font-size: 10px;
  font-weight: 700;
  color: var(--volt);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-bottom: 4px;
}

.preview-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--text-inv);
  margin-bottom: 6px;
}

.preview-meta {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

.preview-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: 100px;
}

/* Day block in preview */
.prev-day {
  margin: 10px 16px 0;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
}

.prev-day-header {
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.prev-day-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.prev-day-name.rest { color: var(--text-3); }

.prev-day-count {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-mono);
}

.prev-ex-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 0.5px solid var(--border);
}

.prev-ex-row:last-child { border-bottom: none; }

.prev-ex-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.prev-ex-meta {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-mono);
}

/* Overview card */
.prev-overview {
  margin: 16px 16px 0;
  background: var(--volt-bg);
  border: 1px solid var(--volt-border);
  border-radius: var(--radius);
  padding: 14px 16px;
}

.prev-overview-text {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
}

/* CTA bar */
.preview-cta {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: var(--bg-card);
  border-top: 0.5px solid var(--border);
  display: flex;
  gap: 10px;
  z-index: 50;
}

/* AI overview section */
.prev-section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 16px 16px 6px;
}
</style>
</head>
<body>

<!-- ══ SCREEN 1: CHAT ══ -->
<div class="screen active" id="screen-chat">
  <div class="chat-header">
    <div class="chat-header-avatar">🤖</div>
    <div>
      <div class="chat-header-name">LaroFit AI Coach</div>
      <div class="chat-header-sub" id="chat-step-label">Building your program</div>
    </div>
  </div>
  <div class="chat-progress">
    <div class="chat-progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="chat-input-bar">
    <input class="chat-input" type="text" id="chat-input"
           placeholder="Type a message…"
           autocomplete="off" autocorrect="off"
           onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="chat-send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send">
      <i class="ti ti-arrow-up"></i>
    </button>
  </div>
</div>

<!-- ══ SCREEN 2: GENERATING ══ -->
<div class="screen" id="screen-generating">
  <div class="gen-spinner"></div>
  <div class="gen-title">BUILDING YOUR<br>PROGRAM</div>
  <div class="gen-steps">
    <div class="gen-step" id="gstep-1">
      <div class="gen-step-icon"><i class="ti ti-brain"></i></div>
      <span>Analyzing your goals and schedule</span>
    </div>
    <div class="gen-step" id="gstep-2">
      <div class="gen-step-icon"><i class="ti ti-dumbbell"></i></div>
      <span>Selecting exercises for your equipment</span>
    </div>
    <div class="gen-step" id="gstep-3">
      <div class="gen-step-icon"><i class="ti ti-calendar"></i></div>
      <span>Mapping workouts to your training days</span>
    </div>
    <div class="gen-step" id="gstep-4">
      <div class="gen-step-icon"><i class="ti ti-check"></i></div>
      <span>Finalizing sets, reps, and rest times</span>
    </div>
  </div>
</div>

<!-- ══ SCREEN 3: PREVIEW ══ -->
<div class="screen" id="screen-preview">
  <div class="preview-header">
    <div class="preview-eyebrow">Your program is ready</div>
    <div class="preview-title" id="preview-prog-name">MY PROGRAM</div>
    <div class="preview-meta" id="preview-prog-meta">—</div>
  </div>
  <div class="preview-body" id="preview-body"></div>
  <div class="preview-cta">
    <button class="btn btn-outline btn-sm" onclick="rebuildProgram()" style="flex-shrink:0;">
      <i class="ti ti-refresh"></i> Rebuild
    </button>
    <button class="btn btn-volt btn-full btn-lg" onclick="acceptProgram()">
      Start training <i class="ti ti-arrow-right"></i>
    </button>
  </div>
</div>

<script src="supabase-client.js"></script>
<script src="larofit-exercises.js"></script>
<script>
LF.ready().then(() => LF.guard());

/* ============================================================
   onboarding.js — LaroFit v2 AI-first onboarding
   ============================================================ */

// ── CONFIG ───────────────────────────────────────────────────
// NOTE: Replace with a valid API key. This key is deactivated.
const API_KEY = localStorage.getItem('lf_anthropic_key') || '';

// ── STATE ─────────────────────────────────────────────────────
let conversationHistory = [];
let questionCount       = 0;
let totalQuestions      = 7;
let multiSelectBuffer   = [];  // for multi-select quick replies
let multiSelectMode     = false;
let generatedProgram    = null; // final parsed program object

// ── USER DATA ─────────────────────────────────────────────────
const user = (() => {
  try { return JSON.parse(localStorage.getItem('lf_user') || '{}'); }
  catch { return {}; }
})();

const firstName = user.name || 'there';

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  startChat();
});

function startChat() {
  const opening = `Hey ${firstName}! I'm your LaroFit AI Coach. I'm going to build you a personalized workout program — I just need to ask you a few quick questions. Let's start: **What's your main fitness goal?**`;
  addMessage('ai', opening);
  setQuickReplies(['Build muscle', 'Lose weight', 'Get stronger', 'Improve fitness', 'Tone up'], 'single');
  updateProgress(1);
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMessage(text) {
  const input = document.getElementById('chat-input');
  const msg   = text || input.value.trim();
  if (!msg) return;

  input.value = '';
  clearQuickReplies();
  setInputEnabled(false);

  addMessage('user', msg);
  conversationHistory.push({ role: 'user', content: msg });
  questionCount++;
  updateProgress(questionCount);

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        system: getSystemPrompt(),
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      // No API key or invalid key — use demo mode
      handleDemoMode(msg);
      return;
    }

    const aiText = data.content?.[0]?.text || '';

    if (aiText.includes('GENERATING_PLAN')) {
      // Strip the signal and treat remainder as the raw plan JSON
      const planText = aiText.replace('GENERATING_PLAN', '').trim();
      conversationHistory.push({ role: 'assistant', content: aiText });
      showGenerating(planText);
    } else {
      conversationHistory.push({ role: 'assistant', content: aiText });
      addMessage('ai', aiText);
      const qrs = extractQuickReplies(aiText);
      if (qrs.length) setQuickReplies(qrs.options, qrs.mode);
      setInputEnabled(true);
    }

  } catch (err) {
    removeTyping();
    console.error(err);
    // Fall back to demo mode if API unreachable
    handleDemoMode(msg);
  }
}

// ── DEMO MODE (no API key) ────────────────────────────────────
// Walks through questions locally, then generates a canned program
const demoFlow = [
  { q: "Great goal! What equipment do you have access to?",
    qrs: ['Full gym', 'Dumbbells only', 'Machines only', 'Bodyweight only'], mode: 'single' },
  { q: "How long have you been training?",
    qrs: ['Less than 6 months', '6–12 months', '1–3 years', '3+ years'], mode: 'single' },
  { q: "Which days of the week can you train?",
    qrs: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], mode: 'multi' },
  { q: "How long can each workout be?",
    qrs: ['30 min', '45 min', '60 min', '90 min'], mode: 'single' },
  { q: "What time of day do you usually train?",
    qrs: ['Morning', 'Afternoon', 'Evening'], mode: 'single' },
  { q: "Any injuries or physical limitations I should know about?",
    qrs: ['None', 'Shoulder', 'Knee', 'Lower back', 'Other'], mode: 'single' },
];
let demoStep = 0;
let demoAnswers = {};

function handleDemoMode(userMsg) {
  if (demoStep === 0) {
    // First message was the goal
    demoAnswers.goal = userMsg;
  } else if (demoStep <= demoFlow.length) {
    const key = ['equipment','experience','days','duration','time','injuries'][demoStep - 1];
    demoAnswers[key] = userMsg;
  }

  if (demoStep < demoFlow.length) {
    const step = demoFlow[demoStep];
    addMessage('ai', step.q);
    setQuickReplies(step.qrs, step.mode);
    setInputEnabled(true);
    demoStep++;
  } else {
    // All questions answered — generate program
    addMessage('ai', "Perfect — I have everything I need. Building your program now!");
    setTimeout(() => showGenerating(null), 800);
  }
}

// ── SYSTEM PROMPT ─────────────────────────────────────────────
function getSystemPrompt() {
  // Build exercise name→id lookup string for the prompt
  const exList = (typeof LAROFIT_EXERCISES !== 'undefined' ? LAROFIT_EXERCISES : [])
    .filter(e => ['strength','hiit','timed_bodyweight','plyo'].includes(e.type))
    .map(e => `${e.name} [${e.id}]`)
    .join(', ');

  return `You are LaroFit's AI Coach — a direct, knowledgeable personal trainer building a personalized weekly workout program for a new member.

USER PROFILE:
- Name: ${firstName}
- Sex: ${user.sex || 'not specified'}
- DOB: ${user.dob || 'not specified'}

EXERCISE LIBRARY — you MUST only use exercises from this list. Always include the [id] in brackets after each exercise name in your JSON output:
${exList}

YOUR JOB:
Ask ONE question at a time to gather what you need. Be conversational — like a trainer texting a client, not a clinical intake form.

QUESTIONS TO ASK (in roughly this order, adapt based on answers):
1. Main fitness goal (if not yet known)
2. Equipment available (full gym / dumbbells / machines / bodyweight)
3. Training experience (beginner / intermediate / advanced)
4. Which specific days of the week they train
5. How long each workout can be (30/45/60/90 min)
6. What time of day they train (to personalize intensity notes)
7. Any injuries or physical limitations

INJURY RULES:
- If injury mentioned: ask ONE follow-up about which side and what movements hurt. Then acknowledge what you're removing and substituting. Move on.
- Rotator cuff: exclude overhead press, upright rows. Substitute: lateral raises, cable flyes, face pulls.
- Knee issues: exclude deep squats, lunges. Substitute: leg press, leg extensions, step-ups.
- Lower back: exclude deadlifts, heavy rows. Substitute: machines, cables.

LANGUAGE RULES — NEVER USE: "hypertrophy" (say "muscle growth"), "macros" (say "protein, carbs, and fat"), "caloric deficit" (say "eating less than you burn"), "TDEE", "periodization", "progressive overload" (say "gradually adding weight or reps").

QUICK REPLY HINTS — when asking a question with clear options, end your message with:
QUICK_REPLIES: option1 | option2 | option3 | option4
For multi-select questions (like training days), add MULTI at the end:
QUICK_REPLIES: Mon | Tue | Wed | Thu | Fri | Sat | Sun | MULTI

When you have all information, output EXACTLY "GENERATING_PLAN" on its own line, then immediately output the program as a JSON object (no markdown fences, no extra text before or after the JSON):

{
  "name": "Program name (e.g. Push Pull Legs)",
  "overview": "2–3 sentence description of the approach",
  "weeks": 8,
  "goal": "muscle_growth",
  "days": [
    {
      "name": "Day name (e.g. Push — Chest & Shoulders)",
      "rest": false,
      "exercises": [
        { "id": "b7", "name": "Barbell bench press", "sets": 4, "reps": 8, "restSec": 90 }
      ]
    },
    { "name": "Rest", "rest": true }
  ]
}

Rules for the program JSON:
- Map training days EXACTLY to the days they specified. Non-training days are rest: true.
- 4–6 exercises per training day depending on duration (30min=4, 45min=5, 60min=6)
- Beginner: 3 sets × 10–12 reps. Intermediate: 4 sets × 6–10 reps. Advanced: 4–5 sets × 5–8 reps.
- restSec: compound lifts 90, isolation exercises 60, heavy strength 120
- Only use exercise IDs from the library. Never invent IDs.
- The days array must cover exactly 7 days (Mon–Sun).`;
}

// ── EXTRACT QUICK REPLIES FROM AI TEXT ───────────────────────
function extractQuickReplies(text) {
  const match = text.match(/QUICK_REPLIES:\s*(.+)/i);
  if (!match) return { options: [], mode: 'single' };
  const parts  = match[1].split('|').map(s => s.trim()).filter(Boolean);
  const isMulti = parts.includes('MULTI');
  const options = parts.filter(p => p !== 'MULTI');
  return { options, mode: isMulti ? 'multi' : 'single' };
}

// ── GENERATING SCREEN ─────────────────────────────────────────
async function showGenerating(planText) {
  showScreen('screen-generating');

  const steps = ['gstep-1','gstep-2','gstep-3','gstep-4'];
  let si = 0;

  const stepInterval = setInterval(() => {
    if (si > 0) document.getElementById(steps[si - 1])?.classList.replace('active', 'done');
    if (si < steps.length) {
      document.getElementById(steps[si])?.classList.add('active');
      si++;
    } else {
      clearInterval(stepInterval);
    }
  }, 600);

  // If we have planText from the API, parse it
  // Otherwise build a default program from demoAnswers
  await new Promise(r => setTimeout(r, 2800));

  clearInterval(stepInterval);
  steps.forEach(s => document.getElementById(s)?.classList.add('done'));

  let program = null;

  if (planText) {
    program = parsePlanJSON(planText);
  }

  if (!program) {
    program = buildFallbackProgram();
  }

  generatedProgram = program;
  showPreview(program);
}

// ── PARSE AI PLAN JSON ────────────────────────────────────────
function parsePlanJSON(text) {
  try {
    // Strip any markdown fences just in case
    const clean = text.replace(/```json|```/g, '').trim();
    // Find the first { to last } in case there's prose around it
    const start = clean.indexOf('{');
    const end   = clean.lastIndexOf('}');
    if (start === -1 || end === -1) return null;
    const jsonStr = clean.slice(start, end + 1);
    const parsed  = JSON.parse(jsonStr);

    // Validate and enrich
    if (!parsed.days || !Array.isArray(parsed.days)) return null;

    parsed.id      = 'ai_' + Date.now();
    parsed.savedAt = new Date().toISOString();
    parsed.aiGenerated = true;

    // Ensure each exercise has a proper name from the library
    parsed.days.forEach(day => {
      if (day.rest || !day.exercises) return;
      day.exercises = day.exercises.map(ex => {
        const found = (typeof LAROFIT_EXERCISES !== 'undefined')
          ? LAROFIT_EXERCISES.find(e => e.id === ex.id)
          : null;
        return {
          id:      ex.id || '',
          name:    found ? found.name : (ex.name || ex.id || 'Exercise'),
          sets:    ex.sets   || 3,
          reps:    ex.reps   || 10,
          restSec: ex.restSec || 60,
        };
      });
    });

    return parsed;
  } catch (e) {
    console.error('Plan parse error:', e);
    return null;
  }
}

// ── FALLBACK PROGRAM (demo mode / parse failure) ──────────────
function buildFallbackProgram() {
  const goal     = demoAnswers.goal || 'Build muscle';
  const eq       = (demoAnswers.equipment || 'Full gym').toLowerCase();
  const daysInput = (demoAnswers.days || 'Mon,Wed,Fri').toLowerCase();
  const exp      = (demoAnswers.experience || '6–12 months').toLowerCase();

  const isBeginner   = exp.includes('less') || exp.includes('6');
  const hasBarbell   = eq.includes('gym') || eq.includes('barbell');
  const hasMachines  = eq.includes('gym') || eq.includes('machine');
  const dbOnly       = eq.includes('dumbbell');
  const bwOnly       = eq.includes('bodyweight');

  const sets = isBeginner ? 3 : 4;
  const reps = isBeginner ? 10 : 8;

  // Day map Mon=0 ... Sun=6
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const fullDayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const trainingDayIdxs = new Set();
  dayNames.forEach((d, i) => { if (daysInput.includes(d.toLowerCase())) trainingDayIdxs.add(i); });
  if (!trainingDayIdxs.size) { [0, 2, 4].forEach(i => trainingDayIdxs.add(i)); } // default Mon/Wed/Fri

  // Exercise pools by equipment
  const pushEx   = dbOnly ? ['b1','b2','b4'] : bwOnly ? ['b13','b14','b16'] : hasBarbell ? ['b7','b8','b11'] : ['b9','b10','b11'];
  const pullEx   = dbOnly ? ['b17','b18','b45','b46'] : bwOnly ? ['b29','b31','b50'] : hasBarbell ? ['b22','b23','b25'] : ['b25','b26','b28'];
  const legEx    = dbOnly ? ['b65','b66','b69','b72'] : bwOnly ? ['b83','b84','b85','b89'] : hasBarbell ? ['b74','b75','b78','b79'] : ['b78','b79','b80','b81'];
  const coreEx   = ['b89','b91','b92','b93'];
  const shouldEx = hasBarbell ? ['b32','b33','b34','b42'] : dbOnly ? ['b32','b33','b34','b35'] : ['b39','b40','b41','b42'];

  const count = trainingDayIdxs.size;

  // Build split based on training days count
  let splits = [];
  if (count <= 2) {
    splits = [
      { name: 'Full Body A', exIds: [...pushEx.slice(0,2), ...pullEx.slice(0,2), ...legEx.slice(0,2)] },
      { name: 'Full Body B', exIds: [...pushEx.slice(1,3), ...pullEx.slice(1,3), ...legEx.slice(1,3)] },
    ];
  } else if (count === 3) {
    splits = [
      { name: 'Push — Chest & Shoulders', exIds: [...pushEx.slice(0,3), ...shouldEx.slice(0,2), 'b56'] },
      { name: 'Pull — Back & Biceps',     exIds: [...pullEx.slice(0,3), 'b45', 'b46'] },
      { name: 'Legs & Core',              exIds: [...legEx.slice(0,3), ...coreEx.slice(0,2)] },
    ];
  } else if (count === 4) {
    splits = [
      { name: 'Upper A — Push',        exIds: [...pushEx.slice(0,3), ...shouldEx.slice(0,2)] },
      { name: 'Lower A',               exIds: [...legEx.slice(0,3), ...coreEx.slice(0,2)] },
      { name: 'Upper B — Pull',        exIds: [...pullEx.slice(0,3), 'b45', 'b56'] },
      { name: 'Lower B',               exIds: [...legEx.slice(0,3), ...coreEx.slice(0,2)] },
    ];
  } else {
    splits = [
      { name: 'Chest & Triceps',    exIds: [...pushEx.slice(0,3), 'b57','b64'] },
      { name: 'Back & Biceps',      exIds: [...pullEx.slice(0,3), 'b45','b46'] },
      { name: 'Shoulders & Core',   exIds: [...shouldEx.slice(0,3), ...coreEx.slice(0,2)] },
      { name: 'Legs',               exIds: [...legEx.slice(0,4)] },
      { name: 'Arms & Core',        exIds: ['b45','b46','b57','b62','b64','b89'] },
    ];
  }

  let splitIdx = 0;
  const days = dayNames.map((_, i) => {
    if (!trainingDayIdxs.has(i)) {
      return { name: fullDayNames[i], rest: true };
    }
    const split = splits[splitIdx % splits.length];
    splitIdx++;
    return {
      name: `${fullDayNames[i]} — ${split.name}`,
      rest: false,
      exercises: split.exIds.map(id => {
        const found = (typeof LAROFIT_EXERCISES !== 'undefined')
          ? LAROFIT_EXERCISES.find(e => e.id === id) : null;
        return {
          id,
          name:    found ? found.name : id,
          sets,
          reps,
          restSec: ['b7','b22','b74','b38'].includes(id) ? 120 : 60,
        };
      })
    };
  });

  const goalMap = {
    'build muscle':'muscle_growth','lose weight':'weight_loss',
    'get stronger':'strength','improve fitness':'general_fitness','tone up':'toning'
  };
  const goalKey = goalMap[goal.toLowerCase()] || 'general_fitness';

  const splitNames = {
    3: 'Push Pull Legs', 4: 'Upper Lower', 2: 'Full Body'
  };

  return {
    id:           'ai_' + Date.now(),
    name:         splitNames[count] || 'My Program',
    overview:     `A ${count}-day per week program designed around your goal to ${goal.toLowerCase()}. Built for your equipment and schedule.`,
    weeks:        8,
    goal:         goalKey,
    aiGenerated:  true,
    savedAt:      new Date().toISOString(),
    days
  };
}

// ── SHOW PREVIEW ──────────────────────────────────────────────
function showPreview(program) {
  showScreen('screen-preview');

  const trainingDays = program.days.filter(d => !d.rest).length;
  const totalEx      = program.days.reduce((s, d) => s + (d.exercises?.length || 0), 0);

  document.getElementById('preview-prog-name').textContent = program.name.toUpperCase();
  document.getElementById('preview-prog-meta').textContent =
    `${trainingDays} training days · ${totalEx} exercises · ${program.weeks || 8} weeks`;

  let html = '';

  // Overview
  if (program.overview) {
    html += `<div class="prev-section-label">About this program</div>
      <div class="prev-overview">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <i class="ti ti-robot" style="color:var(--volt-dark);font-size:15px;"></i>
          <span style="font-size:10px;font-weight:700;color:var(--volt-dark);letter-spacing:0.1em;text-transform:uppercase;font-family:var(--font-mono);">AI Coach</span>
        </div>
        <div class="prev-overview-text">${esc(program.overview)}</div>
      </div>`;
  }

  html += `<div class="prev-section-label">Weekly schedule</div>`;

  program.days.forEach(day => {
    if (day.rest) {
      html += `<div class="prev-day">
        <div class="prev-day-header">
          <div class="prev-day-name rest">${esc(day.name || 'Rest')}</div>
          <div class="prev-day-count">REST</div>
        </div>
      </div>`;
      return;
    }
    const exRows = (day.exercises || []).map(ex =>
      `<div class="prev-ex-row">
        <div class="prev-ex-name">${esc(ex.name)}</div>
        <div class="prev-ex-meta">${ex.sets} × ${ex.reps}</div>
      </div>`
    ).join('');

    html += `<div class="prev-day">
      <div class="prev-day-header">
        <div class="prev-day-name">${esc(day.name)}</div>
        <div class="prev-day-count">${day.exercises?.length || 0} exercises</div>
      </div>
      ${exRows}
    </div>`;
  });

  document.getElementById('preview-body').innerHTML = html;
}

// ── ACCEPT / REBUILD ──────────────────────────────────────────
function acceptProgram() {
  if (!generatedProgram) return;

  // Save program
  const programs = [];
  programs.push(generatedProgram);
  localStorage.setItem('lf_programs', JSON.stringify(programs));
  localStorage.setItem('lf_active_program', JSON.stringify(generatedProgram.id));
  localStorage.setItem('lf_seeded', JSON.stringify(true));

  // Save user properly
  const existing = (() => { try { return JSON.parse(localStorage.getItem('lf_user') || '{}'); } catch { return {}; } })();
  localStorage.setItem('lf_user', JSON.stringify({ ...existing, onboarded: true }));

  window.location.href = 'index.html';
}

function rebuildProgram() {
  // Reset and go back to chat
  conversationHistory = [];
  questionCount = 0;
  demoStep = 0;
  demoAnswers = {};
  generatedProgram = null;
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('quick-replies').innerHTML = '';
  showScreen('screen-chat');
  startChat();
}

// ── HELPERS ───────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const msgEl     = document.createElement('div');
  msgEl.className = `msg ${role}`;

  const isAI = role === 'ai';

  // Strip QUICK_REPLIES line from displayed text
  const displayText = text.replace(/QUICK_REPLIES:.*$/gim, '').trim();
  // Basic markdown: **bold**
  const formatted = displayText
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  msgEl.innerHTML = isAI
    ? `<div class="msg-avatar">🤖</div><div class="msg-bubble">${formatted}</div>`
    : `<div class="msg-bubble">${esc(displayText)}</div>`;

  container.appendChild(msgEl);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.id = 'typing-indicator';
  el.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function setQuickReplies(options, mode = 'single') {
  const container = document.getElementById('quick-replies');
  multiSelectMode   = mode === 'multi';
  multiSelectBuffer = [];
  container.innerHTML = '';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className   = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => handleQuickReply(btn, opt, mode);
    container.appendChild(btn);
  });

  // For multi-select, add a Done button
  if (mode === 'multi') {
    const doneBtn = document.createElement('button');
    doneBtn.className   = 'qr-btn';
    doneBtn.id          = 'qr-done';
    doneBtn.textContent = 'Done ✓';
    doneBtn.style.cssText = 'background:var(--volt);color:#1a1a1a;font-weight:700;border-color:var(--volt);display:none;';
    doneBtn.onclick = () => {
      if (multiSelectBuffer.length) sendMessage(multiSelectBuffer.join(', '));
    };
    container.appendChild(doneBtn);
  }
}

function handleQuickReply(btn, value, mode) {
  if (mode === 'multi') {
    btn.classList.toggle('selected');
    if (btn.classList.contains('selected')) {
      multiSelectBuffer.push(value);
    } else {
      multiSelectBuffer = multiSelectBuffer.filter(v => v !== value);
    }
    const doneBtn = document.getElementById('qr-done');
    if (doneBtn) doneBtn.style.display = multiSelectBuffer.length ? 'inline-flex' : 'none';
  } else {
    sendMessage(value);
  }
}

function clearQuickReplies() {
  document.getElementById('quick-replies').innerHTML = '';
  multiSelectBuffer = [];
  multiSelectMode   = false;
}

function setInputEnabled(enabled) {
  document.getElementById('chat-input').disabled  = !enabled;
  document.getElementById('send-btn').disabled    = !enabled;
}

function updateProgress(step) {
  const pct = Math.min(100, Math.round((step / totalQuestions) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('chat-step-label').textContent =
    step >= totalQuestions ? 'Ready to build' : `Question ${step} of ${totalQuestions}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
