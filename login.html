<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>LaroFit — Sign In</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="appletouchicon.png">
<link rel="stylesheet" href="larofit.css?v=2">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
html, body {
  background: #1a1a1a;
  min-height: 100vh;
  min-height: 100dvh;
}
button, a, input { touch-action: manipulation; }
input { font-size: 16px !important; }

/* ── LAYOUT ── */
.li-wrap {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: #1a1a1a;
}

/* ── HERO ── */
.li-hero {
  padding: max(56px, env(safe-area-inset-top, 56px)) 24px 36px;
  text-align: center;
  flex-shrink: 0;
}
.li-logo {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 3px;
  color: #fff;
  margin-bottom: 28px;
}
.li-logo span { color: var(--volt); }
.li-headline {
  font-family: var(--font-display);
  font-size: 38px;
  letter-spacing: 1px;
  color: #fff;
  line-height: 1.05;
  margin-bottom: 10px;
}
.li-headline span { color: var(--volt); }
.li-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
}

/* ── FORM CARD ── */
.li-card {
  flex: 1;
  background: var(--bg);
  border-radius: 24px 24px 0 0;
  padding: 28px 20px max(40px, env(safe-area-inset-bottom, 40px));
}

/* ── FIELDS ── */
.li-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.li-field { margin-bottom: 16px; }
.li-input {
  width: 100%;
  padding: 13px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  font-size: 16px;
  color: var(--text);
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.li-input:focus { border-color: var(--volt-dark); }
.li-input::placeholder { color: var(--text-3); }

/* ── FORGOT PASSWORD ── */
.li-forgot {
  display: block;
  text-align: right;
  font-size: 12px;
  color: var(--volt-dark);
  font-weight: 600;
  text-decoration: none;
  margin-top: -10px;
  margin-bottom: 20px;
}

/* ── ERROR / SUCCESS ── */
.li-msg {
  display: none;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 16px;
}
.li-msg.error {
  background: var(--danger-bg);
  border: 1px solid var(--danger);
  color: var(--danger);
}
.li-msg.success {
  background: var(--success-bg);
  border: 1px solid var(--success);
  color: var(--success);
}

/* ── BUTTONS ── */
.li-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.li-btn-primary {
  background: var(--volt);
  color: var(--bg-dark);
}
.li-btn-primary:active { transform: scale(0.98); background: #b8e020; }
.li-btn-primary:disabled {
  background: var(--bg-card2);
  color: var(--text-3);
  cursor: not-allowed;
  transform: none;
}
.li-btn .btn-spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.li-btn.loading .btn-spinner { display: block; }
.li-btn.loading .btn-text    { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.li-signup {
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  margin-top: 20px;
}
.li-signup a {
  color: var(--volt-dark);
  font-weight: 700;
  text-decoration: none;
}

/* ── RESET PASSWORD VIEW ── */
#view-reset { display: none; }
#view-login { display: block; }
</style>
</head>
<body>
<script src="supabase-client.js?v=2"></script>

<div class="li-wrap">

  <!-- HERO -->
  <div class="li-hero">
    <div class="li-logo">LARO<span>FIT</span></div>
    <div class="li-headline">WELCOME<br><span>BACK</span></div>
    <div class="li-sub">Sign in to continue your journey.</div>
  </div>

  <!-- CARD -->
  <div class="li-card">

    <!-- ── LOGIN VIEW ── -->
    <div id="view-login">

      <div class="li-field">
        <label class="li-label" for="l-email">Email address</label>
        <input class="li-input" type="email" id="l-email"
               placeholder="you@email.com"
               autocomplete="email" autocapitalize="none"
               onkeydown="if(event.key==='Enter') document.getElementById('l-pass').focus()">
      </div>

      <div class="li-field">
        <label class="li-label" for="l-pass">Password</label>
        <input class="li-input" type="password" id="l-pass"
               placeholder="Your password"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') handleLogin()">
      </div>

      <a class="li-forgot" href="#" onclick="showReset(); return false;">Forgot password?</a>

      <div class="li-msg" id="li-error"></div>

      <button class="li-btn li-btn-primary" id="li-btn" onclick="handleLogin()">
        <div class="btn-spinner"></div>
        <span class="btn-text"><i class="ti ti-login"></i> Sign in</span>
      </button>

      <div class="li-signup">Don't have an account? <a href="signup.html">Create one free</a></div>

    </div>

    <!-- ── RESET PASSWORD VIEW ── -->
    <div id="view-reset">

      <div style="margin-bottom:20px;">
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;">Reset your password</div>
        <div style="font-size:13px;color:var(--text-3);line-height:1.6;">Enter your email and we'll send you a link to reset your password.</div>
      </div>

      <div class="li-field">
        <label class="li-label" for="r-email">Email address</label>
        <input class="li-input" type="email" id="r-email"
               placeholder="you@email.com"
               autocomplete="email" autocapitalize="none"
               onkeydown="if(event.key==='Enter') handleReset()">
      </div>

      <div class="li-msg" id="reset-msg"></div>

      <button class="li-btn li-btn-primary" id="reset-btn" onclick="handleReset()">
        <div class="btn-spinner"></div>
        <span class="btn-text"><i class="ti ti-mail"></i> Send reset link</span>
      </button>

      <div class="li-signup" style="margin-top:16px;">
        <a href="#" onclick="showLogin(); return false;">← Back to sign in</a>
      </div>

    </div>

  </div>
</div>

<script>
// ── iOS STANDALONE KEYBOARD FIX ───────────────────────────────
// On first launch of the installed PWA, iOS sometimes won't open the
// keyboard for inputs until the view is re-rendered. Toggling the view
// (what showReset/showLogin do) fixes it — so do that invisibly on load.
(function () {
  const standalone = window.matchMedia('(display-mode: standalone)').matches
                  || window.navigator.standalone === true;
  if (!standalone) return;
  window.addEventListener('load', () => {
    const v = document.getElementById('view-login');
    v.style.display = 'none';
    void v.offsetHeight; // force reflow
    v.style.display = 'block';
  });
})();

// ── LOGIN ─────────────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const btn   = document.getElementById('li-btn');

  hideMsg('li-error');

  if (!email || !email.includes('@')) return showMsg('li-error', 'error', 'Please enter a valid email address.');
  if (!pass)                          return showMsg('li-error', 'error', 'Please enter your password.');

  btn.disabled = true;
  btn.classList.add('loading');

  await LF.ready();
  const { data, error } = await LF.auth.signIn(email, pass);

  btn.disabled = false;
  btn.classList.remove('loading');

  if (error) {
    const msg = error.message.includes('Invalid login')
      ? 'Incorrect email or password. Please try again.'
      : error.message;
    return showMsg('li-error', 'error', msg);
  }

  // Cache user basics
  const firstName = data.user?.user_metadata?.name || email.split('@')[0];
  localStorage.setItem('lf_user', JSON.stringify({
    id:       data.user.id,
    email:    data.user.email,
    name:     firstName,
    fullName: data.user?.user_metadata?.full_name || firstName,
    initials: firstName.charAt(0).toUpperCase(),
    onboarded: true,
  }));

  window.location.href = 'index.html';
}

// ── RESET PASSWORD ────────────────────────────────────────────
async function handleReset() {
  const email = document.getElementById('r-email').value.trim();
  const btn   = document.getElementById('reset-btn');

  hideMsg('reset-msg');

  if (!email || !email.includes('@')) return showMsg('reset-msg', 'error', 'Please enter a valid email address.');

  btn.disabled = true;
  btn.classList.add('loading');

  await LF.ready();
  const { error } = await LF.auth.resetPassword(email);

  btn.disabled = false;
  btn.classList.remove('loading');

  if (error) return showMsg('reset-msg', 'error', error.message);

  showMsg('reset-msg', 'success', 'Reset link sent! Check your inbox.');
  btn.style.display = 'none';
}

// ── VIEW SWITCHING ────────────────────────────────────────────
function showReset() {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-reset').style.display = 'block';
  // Pre-fill email if already entered
  const email = document.getElementById('l-email').value.trim();
  if (email) document.getElementById('r-email').value = email;
}

function showLogin() {
  document.getElementById('view-reset').style.display = 'none';
  document.getElementById('view-login').style.display = 'block';
}

// ── MSG HELPERS ───────────────────────────────────────────────
function showMsg(id, type, msg) {
  const el = document.getElementById(id);
  el.textContent  = msg;
  el.className    = 'li-msg ' + type;
  el.style.display = 'block';
}
function hideMsg(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

// ── CHECK RESET PARAM ─────────────────────────────────────────
if (new URLSearchParams(window.location.search).get('reset') === '1') {
  showReset();
}

// ── REDIRECT IF ALREADY LOGGED IN ────────────────────────────
LF.ready().then(async () => {
  const session = await LF.auth.session();
  if (session) window.location.href = 'index.html';
});
</script>
</body>
</html>
