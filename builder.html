<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f0">
<title>LaroFit — Builder</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="appletouchicon.png">
<link rel="stylesheet" href="larofit.css?v=2">
<style>
input, select, textarea { font-size: 16px !important; }
button, input, select, a, textarea { touch-action: manipulation; }

/* ══════════════════════════════════════════
   SCREEN 1 — PROGRAM SETUP
══════════════════════════════════════════ */
.setup-card {
  margin: 14px var(--page-pad) 0;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.setup-name-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 18px !important;
  font-weight: 700;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.setup-name-input:focus { border-color: var(--volt-dark); }
.setup-name-input::placeholder { color: var(--text-3); font-weight: 400; }
.setup-row { display: flex; gap: 10px; }
.setup-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.setup-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.setup-field select,
.setup-field input[type="date"] {
  padding: 9px 10px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
}
.setup-field select:focus,
.setup-field input[type="date"]:focus { border-color: var(--volt-dark); }

/* ══════════════════════════════════════════
   SCREEN 2 — CALENDAR
══════════════════════════════════════════ */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--page-pad) 8px;
}
.cal-nav-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-2);
  cursor: pointer;
}
.cal-nav-btn:disabled { opacity: 0.3; cursor: default; }
.cal-month-label {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--text);
}

/* Day-of-week header */
.cal-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 var(--page-pad);
  margin-bottom: 4px;
}
.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.08em;
  padding: 4px 0;
  font-family: var(--font-mono);
}

/* Calendar grid */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  padding: 0 var(--page-pad);
}

.cal-cell {
  aspect-ratio: 1 / 1.25;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border);
  background: var(--bg-card);
  display: flex;
  flex-direction: column;
  padding: 4px 4px 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
  min-height: 56px;
}
.cal-cell:active { background: var(--bg-card2); }
.cal-cell.empty {
  background: transparent;
  border-color: transparent;
  cursor: default;
  pointer-events: none;
}
.cal-cell.out-of-range {
  opacity: 0.3;
  cursor: default;
  pointer-events: none;
}
.cal-cell.is-today {
  border-color: var(--volt-dark);
  border-width: 1.5px;
}
.cal-cell.has-workout {
  background: var(--bg-dark);
  border-color: var(--bg-dark);
}
.cal-cell.paste-target {
  border-color: var(--volt);
  border-width: 1.5px;
  animation: calPulse 1s ease infinite;
}
@keyframes calPulse {
  0%, 100% { border-color: var(--volt); }
  50%       { border-color: var(--volt-dark); }
}

.cal-date-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  line-height: 1;
  flex-shrink: 0;
}
.cal-cell.has-workout .cal-date-num { color: rgba(255,255,255,0.4); }
.cal-cell.is-today .cal-date-num    { color: var(--volt-dark); }
.cal-cell.has-workout.is-today .cal-date-num { color: var(--volt); }

/* AM/PM session labels in calendar cell */
.cal-session-labels {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 3px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.cal-session-label {
  font-size: 8px;
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-radius: 3px;
  padding: 1px 3px;
}
.cal-session-label.am {
  color: #fbbf24;
  background: rgba(251,191,36,0.18);
}
.cal-session-label.pm {
  color: var(--volt);
  background: rgba(198,241,53,0.15);
}

/* Paste mode banner */
.paste-banner {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 60px);
  left: var(--page-pad);
  right: var(--page-pad);
  background: var(--bg-dark);
  border: 1px solid var(--volt);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  z-index: 150;
  box-shadow: var(--shadow-lg);
  animation: slideDown 0.25s ease;
}
@keyframes slideDown {
  from { transform: translateY(-12px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
.paste-banner-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-inv);
  flex: 1;
}
.paste-banner-text span { color: var(--volt); }
.paste-cancel-btn {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-3);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  padding: 4px 0;
}

/* ══════════════════════════════════════════
   SCREEN 3 — DAY EDITOR
══════════════════════════════════════════ */
.bldr-day-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px var(--page-pad) 12px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
.bldr-back-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--text-2);
  flex-shrink: 0;
}
.bldr-day-title-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
}
.bldr-day-title-input::placeholder { color: var(--text-3); }

/* Session badge in day editor header */
.bldr-session-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  padding: 4px 9px;
  border-radius: 999px;
  flex-shrink: 0;
}
.bldr-session-badge.am {
  background: rgba(251,191,36,0.18);
  color: #b45309;
  border: 1px solid rgba(251,191,36,0.4);
}
.bldr-session-badge.pm {
  background: var(--volt-bg);
  color: var(--volt-dark);
  border: 1px solid var(--volt-border);
}

.bldr-ex-list {
  padding: 12px var(--page-pad);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bldr-ex-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
  animation: fadeUp 0.2s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bldr-ex-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px 10px;
  border-bottom: 0.5px solid var(--border);
}
.bldr-ex-drag {
  color: var(--text-3);
  font-size: 16px;
  cursor: grab;
  flex-shrink: 0;
  padding: 4px;
  touch-action: none;
}
.bldr-ex-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bldr-ex-muscle {
  font-size: 10px;
  color: var(--text-3);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.bldr-ex-del {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--danger-bg);
  color: var(--danger);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  border: none;
  cursor: pointer;
}
.bldr-ex-params {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.bldr-param {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 8px;
  border-right: 0.5px solid var(--border);
}
.bldr-param:last-child { border-right: none; }
.bldr-param-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.bldr-param-input {
  width: 100%;
  max-width: 72px;
  padding: 6px 4px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
  transition: border-color 0.15s;
}
.bldr-param-input::-webkit-inner-spin-button,
.bldr-param-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.bldr-param-input:focus { border-color: var(--volt-dark); background: var(--volt-bg); }
.bldr-param-unit {
  font-size: 9px;
  color: var(--text-3);
  margin-top: 3px;
}
.bldr-add-ex-btn {
  margin: 4px var(--page-pad) 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  border-radius: var(--radius);
  border: 1.5px dashed var(--border-md);
  background: transparent;
  color: var(--text-3);
  font-size: 14px;
  font-weight: 600;
  width: calc(100% - (var(--page-pad) * 2));
  cursor: pointer;
  transition: all 0.15s;
}
.bldr-add-ex-btn:active {
  border-color: var(--volt-dark);
  color: var(--volt-dark);
  background: var(--volt-bg);
}

/* ══════════════════════════════════════════
   LIBRARY BOTTOM SHEET
══════════════════════════════════════════ */
.lib-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 401;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  height: 88vh;
  height: 88dvh;
}
.lib-sheet.open { transform: translateY(0); }
.lib-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 400;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.lib-backdrop.open { opacity: 1; pointer-events: all; }
.lib-sheet-handle {
  width: 36px; height: 4px;
  background: var(--border-md);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}
.lib-sheet-top {
  padding: 10px 16px 0;
  flex-shrink: 0;
  border-bottom: 0.5px solid var(--border);
}
.lib-sheet-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.lib-search-wrap { position: relative; margin-bottom: 10px; }
.lib-search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3); font-size: 16px; pointer-events: none;
}
.lib-search {
  width: 100%;
  padding: 10px 12px 10px 36px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--text); outline: none;
}
.lib-search:focus { border-color: var(--volt-dark); }
.lib-filter-row {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 10px; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  border-bottom: 0.5px solid var(--border);
  margin: 0 -16px; padding-left: 16px; padding-right: 16px;
}
.lib-filter-row::-webkit-scrollbar { display: none; }
.lib-filter-chip {
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border-md);
  background: transparent; color: var(--text-2);
  white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
}
.lib-filter-chip.active {
  background: var(--bg-dark); color: var(--volt); border-color: var(--bg-dark);
}
.lib-eq-row {
  display: flex; gap: 6px; padding: 8px 16px;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 0.5px solid var(--border);
  margin: 0 -16px; flex-shrink: 0;
}
.lib-eq-row::-webkit-scrollbar { display: none; }
.lib-eq-chip {
  padding: 5px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  border: 1px solid var(--border-md);
  background: transparent; color: var(--text-3);
  white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
}
.lib-eq-chip.active {
  background: var(--volt-bg); color: var(--volt-dark); border-color: var(--volt-border);
}
.lib-ex-list {
  flex: 1; overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.lib-ex-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.lib-ex-row:last-child { border-bottom: none; }
.lib-ex-row:active { background: var(--bg); }
.lib-ex-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--bg); border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; color: var(--text-3);
}
.lib-ex-body { flex: 1; min-width: 0; }
.lib-ex-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lib-ex-meta { font-size: 10px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }
.lib-ex-add {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--volt); color: var(--bg-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; flex-shrink: 0; transition: transform 0.15s;
}
.lib-ex-row:active .lib-ex-add { transform: scale(0.88); }
.lib-ex-row.already-added .lib-ex-add {
  background: var(--success-bg); color: var(--success); font-size: 14px;
}
.lib-ex-delete {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: var(--danger-bg);
  border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; flex-shrink: 0;
}
.lib-ex-delete:active { opacity: 0.7; }
.lib-empty { padding: 48px 24px; text-align: center; color: var(--text-3); font-size: 14px; }
.lib-create-row {
  padding: 14px 16px; border-top: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.lib-create-row:active { background: var(--bg-dark); }
.lib-create-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--volt-bg); border: 1px solid var(--volt-dark);
  display: flex; align-items: center; justify-content: center;
  color: var(--volt-dark); font-size: 18px; flex-shrink: 0;
}
.lib-create-label { font-size: 14px; font-weight: 600; color: var(--volt-dark); }
.lib-create-sub   { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* ══════════════════════════════════════════
   SESSION PICKER ACTION SHEET
   (shown when tapping an empty day)
══════════════════════════════════════════ */
.session-picker-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.session-picker-overlay.open { opacity: 1; pointer-events: all; }
.session-picker-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  padding: 0 var(--page-pad) calc(env(safe-area-inset-bottom, 0px) + 20px);
}
.session-picker-sheet.open { transform: translateY(0); }
.session-picker-handle {
  width: 36px; height: 4px; background: var(--border-md);
  border-radius: 2px; margin: 12px auto 0;
}
.session-picker-date {
  font-size: 12px; font-weight: 700; color: var(--text-3);
  text-align: center; padding: 12px 0 4px;
  font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;
}
.session-picker-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  text-align: center; padding-bottom: 14px;
  border-bottom: 0.5px solid var(--border); margin-bottom: 10px;
}

/* ── DAY ACTION SHEET (existing day) ── */
.day-action-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.day-action-overlay.open { opacity: 1; pointer-events: all; }
.day-action-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  padding: 0 var(--page-pad) calc(env(safe-area-inset-bottom, 0px) + 20px);
}
.day-action-sheet.open { transform: translateY(0); }
.day-action-handle {
  width: 36px; height: 4px; background: var(--border-md);
  border-radius: 2px; margin: 12px auto 0;
}
.day-action-date {
  font-size: 12px; font-weight: 700; color: var(--text-3);
  text-align: center; padding: 12px 0 4px;
  font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;
}
.day-action-title {
  font-size: 16px; font-weight: 700; color: var(--text);
  text-align: center; padding-bottom: 14px;
  border-bottom: 0.5px solid var(--border); margin-bottom: 10px;
}
.day-action-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 0.5px solid var(--border);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  background: none; border: none; width: 100%;
  border-bottom: 0.5px solid var(--border);
}
.day-action-btn:last-child { border-bottom: none; }
.day-action-btn:active { opacity: 0.6; }
.day-action-icon {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.day-action-label { font-size: 15px; font-weight: 600; color: var(--text); text-align: left; }
.day-action-sub   { font-size: 11px; color: var(--text-3); margin-top: 1px; text-align: left; }

/* ── SAVE FOOTER ── */
.bldr-save-footer {
  padding: 14px var(--page-pad);
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  border-top: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  bottom: var(--nav-h);
  z-index: 50;
}

/* ── TOAST ── */
.lf-toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--bg-dark); color: var(--volt);
  padding: 10px 20px; border-radius: 999px;
  font-size: 13px; font-weight: 600; font-family: var(--font-mono);
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 500; border: 1px solid var(--volt-border);
}

<script>
LF.ready().then(() => LF.guard());

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let program          = null;   // program object being built
let editingDate      = null;   // 'YYYY-MM-DD' of day being edited
let editingSession   = null;   // 'am' | 'pm'
let pasteMode        = false;
let copiedDate       = null;
let libMuscle         = 'all';
let libEq             = 'all';
let cxSelectedMuscles = [];
let _customsCache     = [];  // seeded from localStorage in init(), updated by Supabase in background

let calYear  = 0;
let calMonth = 0;

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const todayStr = new Date().toISOString().slice(0,10);

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
function showScreen(name) {
  document.getElementById('screen-main').style.display = name === 'main' ? '' : 'none';
  document.getElementById('screen-day').style.display  = name === 'day'  ? '' : 'none';
  window.scrollTo(0, 0);
}

function goBack() {
  window.location.href = 'programs.html';
}

async function init() {
  document.getElementById('prog-start').value = new Date().toISOString().slice(0,10);

  const params = new URLSearchParams(location.search);
  const id = params.get('id') || (() => {
    try {
      const v = localStorage.getItem('lf_editing_program_id');
      if (v) { localStorage.removeItem('lf_editing_program_id'); return JSON.parse(v); }
    } catch {}
    return null;
  })();

  if (id) {
    const programs = JSON.parse(localStorage.getItem('lf_programs') || '[]');
    program = programs.find(p => p.id === id);
    if (!program) { showToast('Program not found'); goBack(); return; }
    // Migrate old flat day structure to AM/PM if needed
    migrateLegacyDays();
    loadProgramIntoSetup();
  } else {
    program = makeBlankProgram();
  }

  // Seed cache immediately from localStorage so library works before Supabase responds
  _customsCache = LF.db._customsLocalCache();

  buildLibraryFilters();
  initCalendarView();

  // Auto-open library picker if returning from exercise-create
  if (new URLSearchParams(location.search).get('openLibrary') === '1') {
    setTimeout(openLibrary, 400);
  }

  // Sync custom exercises in the background — don't block the UI
  LF.db.migrateLocalCustomExercises()
    .then(() => LF.db.getCustomExercises())
    .then(customs => { _customsCache = customs; })
    .catch(() => {});
}

function onSetupChange() {
  flushSetupToProgram();
  initCalendarView();
}

function onNameInput() {
  const val = document.getElementById('prog-name').value.trim();
  document.getElementById('cal-header-title').textContent = val ? val.toUpperCase() : 'NEW PROGRAM';
}

function makeBlankProgram() {
  return {
    id:          'prog_' + Date.now(),
    name:        '',
    goal:        'hypertrophy',
    weeks:       8,
    startDate:   new Date().toISOString().slice(0,10),
    aiGenerated: false,
    savedAt:     null,
    days:        {},
  };
}

// Migrate old { name, exercises[] } days to { am: {...} | null, pm: null }
function migrateLegacyDays() {
  if (!program.days) { program.days = {}; return; }
  Object.keys(program.days).forEach(dateStr => {
    const d = program.days[dateStr];
    // If it has an exercises array at the top level it's the old format
    if (Array.isArray(d.exercises)) {
      program.days[dateStr] = {
        am: { name: d.name || 'Workout', exercises: d.exercises },
        pm: null,
      };
    }
  });
}

function loadProgramIntoSetup() {
  document.getElementById('prog-name').value  = program.name  || '';
  document.getElementById('prog-goal').value  = program.goal  || 'hypertrophy';
  document.getElementById('prog-weeks').value = program.weeks || 8;
  document.getElementById('prog-start').value = program.startDate || new Date().toISOString().slice(0,10);
}

function flushSetupToProgram() {
  program.name      = document.getElementById('prog-name').value.trim();
  program.goal      = document.getElementById('prog-goal').value;
  program.weeks     = parseInt(document.getElementById('prog-weeks').value);
  program.startDate = document.getElementById('prog-start').value;
}

// ══════════════════════════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════════════════════════
function programDateRange() {
  const start = new Date(program.startDate + 'T00:00:00');
  const end   = new Date(start);
  end.setDate(end.getDate() + program.weeks * 7 - 1);
  return {
    startStr: program.startDate,
    endStr:   end.toISOString().slice(0,10),
    start,
    end,
  };
}

function initCalendarView() {
  const { start } = programDateRange();
  calYear  = start.getFullYear();
  calMonth = start.getMonth();
  document.getElementById('cal-header-title').textContent =
    (program.name || 'NEW PROGRAM').toUpperCase();
  renderCalendar();

  const grid = document.getElementById('cal-grid');
  let lastTap = 0;
  grid.addEventListener('touchend', e => {
    lastTap = Date.now();
    calGridTap(e);
  }, { passive: true });
  grid.addEventListener('click', e => {
    if (Date.now() - lastTap < 400) return;
    calGridTap(e);
  });
}

function renderCalendar() {
  const range = programDateRange();
  document.getElementById('cal-month-label').textContent = MONTH_NAMES[calMonth] + ' ' + calYear;

  const startM    = new Date(range.startStr + 'T00:00:00');
  const endM      = new Date(range.endStr   + 'T00:00:00');
  const thisFirst = new Date(calYear, calMonth, 1);

  document.getElementById('cal-prev').disabled =
    thisFirst <= new Date(startM.getFullYear(), startM.getMonth(), 1);
  document.getElementById('cal-next').disabled =
    thisFirst >= new Date(endM.getFullYear(), endM.getMonth(), 1);

  const firstDow    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = '';

  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const inRange = dateStr >= range.startStr && dateStr <= range.endStr;
    const isToday = dateStr === todayStr;
    const day     = program.days[dateStr]; // { am, pm } | undefined
    const hasAM   = day && day.am;
    const hasPM   = day && day.pm;
    const hasAny  = hasAM || hasPM;

    let cls = 'cal-cell';
    if (!inRange) cls += ' out-of-range';
    if (isToday)  cls += ' is-today';
    if (hasAny)   cls += ' has-workout';
    if (pasteMode && inRange) cls += ' paste-target';

    let sessionsHtml = '';
    if (hasAny) {
      sessionsHtml = `<div class="cal-session-labels">`;
      if (hasAM) {
        const amName = day.am.name || 'AM';
        sessionsHtml += `<div class="cal-session-label am">${escHtml(amName)}</div>`;
      }
      if (hasPM) {
        const pmName = day.pm.name || 'PM';
        sessionsHtml += `<div class="cal-session-label pm">${escHtml(pmName)}</div>`;
      }
      sessionsHtml += `</div>`;
    }

    html += `
      <div class="${cls}" ${inRange ? `data-date="${dateStr}"` : ''}>
        <div class="cal-date-num">${d}</div>
        ${sessionsHtml}
      </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function calGridTap(e) {
  const cell = e.target.closest('[data-date]');
  if (!cell) return;
  const dateStr = cell.dataset.date;
  if (dateStr) handleDayTap(dateStr);
}

function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

// ══════════════════════════════════════════════════════════════════════
// DAY TAP LOGIC
// ══════════════════════════════════════════════════════════════════════
function handleDayTap(dateStr) {
  if (pasteMode) {
    pasteWorkout(dateStr);
    return;
  }

  const day  = program.days[dateStr];
  const hasAM = day && day.am;
  const hasPM = day && day.pm;

  if (!hasAM && !hasPM) {
    // Empty day — show session picker
    openSessionPicker(dateStr);
  } else {
    // Has at least one session — show action sheet
    openDayAction(dateStr);
  }
}

// DAY ACTION SHEET (days with existing sessions)

let actionDate = null;

      <button class="day-action-btn" onclick="dayActionEditSession('am')">

      <button class="day-action-btn" onclick="dayActionEditSession('pm')">

          <div class="day-action-label">${escHtml(day.pm.name || 'PM Session')}</div>

    btns += `
      <button class="day-action-btn" onclick="dayActionAddSession('pm')">

function closeDayAction() {
  document.getElementById('day-action-overlay').classList.remove('open');
  document.getElementById('day-action-sheet').classList.remove('open');
  actionDate = null;
}

function dayActionEditSession(session) {
  const date = actionDate;
  closeDayAction();
  openDayEditor(date, session);
}

function dayActionAddSession(session) {
  const date = actionDate;
  closeDayAction();
  openDayEditor(date, session);
}

function dayActionCopy() {
  copiedDate = actionDate;
  const day  = program.days[copiedDate];
  const parts = [];
  if (day.am) parts.push(day.am.name || 'AM');
  if (day.pm) parts.push(day.pm.name || 'PM');
  document.getElementById('paste-banner-name').textContent = parts.join(' + ');
  document.getElementById('paste-banner').style.display = 'flex';
  pasteMode = true;
  closeDayAction();
  renderCalendar();
}

function dayActionClear() {
  const btn = document.getElementById('clear-btn');
  if (btn && btn.dataset.confirming === 'true') {
    delete program.days[actionDate];
    closeDayAction();
    renderCalendar();
    showToast('Day cleared');
  } else {
    if (btn) {
      btn.dataset.confirming = 'true';
      btn.querySelector('.day-action-label').textContent = 'Tap again to confirm';
      btn.querySelector('.day-action-sub').textContent   = 'This will remove all sessions';
      setTimeout(() => {
        if (btn && btn.dataset.confirming) {
          btn.dataset.confirming = '';
          btn.querySelector('.day-action-label').textContent = 'Clear this day';
          btn.querySelector('.day-action-sub').textContent   = 'Remove all sessions from this date';
        }
      }, 3000);
    }
  }

// PASTE
// ══════════════════════════════════════════════════════════════════════
function pasteWorkout(targetDate) {
  const source = program.days[copiedDate];
  if (!source) { cancelPaste(); return; }
  program.days[targetDate] = JSON.parse(JSON.stringify(source));
  cancelPaste();
  renderCalendar();
  showToast('Day pasted to ' + formatDateShort(targetDate));
}

function cancelPaste() {
  pasteMode  = false;
  copiedDate = null;
  document.getElementById('paste-banner').style.display = 'none';
  renderCalendar();
}

// ══════════════════════════════════════════════════════════════════════
// SCREEN 3 — DAY EDITOR
// ══════════════════════════════════════════════════════════════════════
function openDayEditor(dateStr, session) {
  editingDate    = dateStr;
  editingSession = session; // 'am' | 'pm'

  // Ensure the day and session objects exist
  if (!program.days[dateStr]) {
    program.days[dateStr] = { am: null, pm: null };
  }
  if (!program.days[dateStr][session]) {
    program.days[dateStr][session] = { name: '', exercises: [] };
  }

  const sessionData = program.days[dateStr][session];
  document.getElementById('day-title-input').value = sessionData.name || '';

  // Session badge
  const badge = document.getElementById('session-badge');
  if (session === 'am') {
    badge.textContent = '☀ AM';
    badge.className   = 'bldr-session-badge am';
  } else {
    badge.textContent = '🌙 PM';
    badge.className   = 'bldr-session-badge pm';
  }

  // Placeholder hint
  document.getElementById('day-title-input').placeholder =
    session === 'am' ? 'e.g. AM Cardio, AM Abs' : 'e.g. PM Chest, PM Legs';

  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('day-date-label').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  showScreen('day');
  buildLibraryFilters();
  renderExList();
}

function saveDayAndBack() {
  if (editingDate && editingSession) {
    const nameVal = document.getElementById('day-title-input').value.trim();
    const session = program.days[editingDate][editingSession];

    if (session) {
      // If no name and no exercises, remove this session
      if (!nameVal && session.exercises.length === 0) {
        program.days[editingDate][editingSession] = null;
      } else {
        session.name = nameVal || (editingSession === 'am' ? 'AM Workout' : 'PM Workout');
      }
    }

    // If both sessions are now null, remove the day entirely
    const day = program.days[editingDate];
    if (!day.am && !day.pm) {
      delete program.days[editingDate];
    }
  }

  editingDate    = null;
  editingSession = null;
  showScreen('main');
  renderCalendar();
}

function backToCalendar() {
  saveDayAndBack();
}

// ══════════════════════════════════════════════════════════════════════
// EXERCISE LIST
// ══════════════════════════════════════════════════════════════════════
function currentSession() {
  if (!editingDate || !editingSession) return null;
  return program.days[editingDate] && program.days[editingDate][editingSession];
}

function buildExParams(ex, ei) {
  const rt = ex.recordType || 'weight_reps';
  const p = (label, key, unit, min, max, step='1', inputType='number') => `
    <div class="bldr-param">
      <div class="bldr-param-label">${label}</div>
      <input class="bldr-param-input" type="${inputType}"
        value="${ex[key] ?? ''}" min="${min}" max="${max}" step="${step}"
        onchange="updateExParam(${ei},'${key}',this.value)">
      <div class="bldr-param-unit">${unit}</div>
    </div>`;

  if (rt === 'weight_reps') return `
    ${p('Sets',   'sets',        'sets', 1, 20)}
    ${p('Weight', 'weight',      'kg',   0, 999, '0.5')}
    ${p('Reps',   'reps',        'reps', 1, 100)}
    ${p('Rest',   'restSec',     'sec',  0, 600, '15')}`;

  if (rt === 'reps') return `
    ${p('Sets',   'sets',        'sets', 1, 20)}
    ${p('Reps',   'reps',        'reps', 1, 100)}
    ${p('Rest',   'restSec',     'sec',  0, 600, '15')}`;

  if (rt === 'duration') return `
    ${p('Sets',   'sets',        'sets', 1, 20)}
    ${p('Duration','durationSec','sec',  5, 3600, '5')}
    ${p('Rest',   'restSec',     'sec',  0, 600,  '15')}`;

  if (rt === 'cardio') return `
    ${p('Duration','durationMin','min',  1, 300)}
    ${p('Distance','distance',   'km',   0, 100,  '0.1')}`;

  if (rt === 'reps_duration') return `
    ${p('Sets',     'sets',        'sets', 1, 20)}
    ${p('Reps',     'reps',        'reps', 1, 100)}
    ${p('Duration', 'durationSec', 'sec',  5, 3600, '5')}
    ${p('Rest',     'restSec',     'sec',  0, 600,  '15')}`;

  // fallback
  return `
    ${p('Sets', 'sets',    'sets', 1, 20)}
    ${p('Reps', 'reps',    'reps', 1, 100)}
    ${p('Rest', 'restSec', 'sec',  0, 600, '15')}`;
}

function renderExList() {
  const session = currentSession();
  const list    = document.getElementById('ex-list');

  if (!session || session.exercises.length === 0) {
    list.innerHTML = `
      <div style="padding:32px 0 8px;text-align:center;">
        <div style="font-size:32px;opacity:0.25;margin-bottom:8px;">🏋️</div>
        <div style="font-size:14px;color:var(--text-3);font-weight:500;">No exercises yet</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:4px;">Tap "Add exercise" below</div>
      </div>`;
    return;
  }

  list.innerHTML = session.exercises.map((ex, ei) => `
    <div class="bldr-ex-card" id="ex-card-${ei}">
      <div class="bldr-ex-card-header">
        <span class="bldr-ex-drag" title="Drag to reorder">⠿</span>
        <div style="flex:1;min-width:0;">
          <div class="bldr-ex-name">${escHtml(ex.name)}</div>
          <div class="bldr-ex-muscle">${(ex.muscles || []).slice(0,2).join(' · ')}</div>
        </div>
        <button class="bldr-ex-del" onclick="removeExercise(${ei})" aria-label="Remove">✕</button>
      </div>
      <div class="bldr-ex-params">
        ${buildExParams(ex, ei)}
      </div>
    </div>`).join('');

  initDrag();
}

function updateExParam(ei, key, val) {
  const session = currentSession();
  if (!session || !session.exercises[ei]) return;
  const floatKeys = ['weight', 'distance'];
  session.exercises[ei][key] = floatKeys.includes(key) ? (parseFloat(val) || 0) : (parseInt(val) || 0);
}

function removeExercise(ei) {
  const session = currentSession();
  if (!session) return;
  session.exercises.splice(ei, 1);
  renderExList();
}

// ══════════════════════════════════════════════════════════════════════
// DRAG TO REORDER
// ══════════════════════════════════════════════════════════════════════
function initDrag() {
  const list = document.getElementById('ex-list');
  let dragEl = null, startY = 0, startIdx = -1, curIdx = -1;

  list.querySelectorAll('.bldr-ex-drag').forEach((handle, i) => {
    handle.addEventListener('touchstart', e => {
      dragEl   = handle.closest('.bldr-ex-card');
      startIdx = curIdx = i;
      startY   = e.touches[0].clientY;
      dragEl.style.opacity = '0.7';
      dragEl.style.zIndex  = '10';
      e.preventDefault();
    }, { passive: false });
  });

  list.addEventListener('touchmove', e => {
    if (!dragEl) return;
    const dy     = e.touches[0].clientY - startY;
    const cards  = [...list.querySelectorAll('.bldr-ex-card')];
    const cardH  = dragEl.offsetHeight + 10;
    const newIdx = Math.max(0, Math.min(cards.length - 1, startIdx + Math.round(dy / cardH)));
    if (newIdx !== curIdx) {
      const session = currentSession();
      if (!session) return;
      const moved = session.exercises.splice(curIdx, 1)[0];
      session.exercises.splice(newIdx, 0, moved);
      curIdx = newIdx;
      renderExList();
      initDrag();
    }
    e.preventDefault();
  }, { passive: false });

  list.addEventListener('touchend', () => {
    if (dragEl) {
      dragEl.style.opacity = '';
      dragEl.style.zIndex  = '';
      dragEl = null;
    }
  });
}

const MUSCLE_FILTERS = [
  { id:'all',        label:'All' },
  { id:'abs',        label:'Abs' },
  { id:'back',       label:'Back' },
  { id:'biceps',     label:'Biceps' },
  { id:'chest',      label:'Chest' },
  { id:'forearms',   label:'Forearms' },
  { id:'glutes',     label:'Glutes' },
  { id:'shoulders',  label:'Shoulders' },
  { id:'triceps',    label:'Triceps' },
  { id:'upper_legs', label:'Upper Legs' },
  { id:'lower_legs', label:'Lower Legs' },
  { id:'cardio',     label:'Cardio' },
];
const EQ_FILTERS = [
  { id:'all',            label:'All equipment' },
  { id:'bodyweight',     label:'Bodyweight' },
  { id:'bands',          label:'Bands' },
  { id:'barbell',        label:'Barbell' },
  { id:'bench',          label:'Bench' },
  { id:'cardio_machine', label:'Cardio Machine' },
  { id:'dumbbells',      label:'Dumbbells' },

  { id:'ez_bar',         label:'EZ Bar' },
  { id:'kettlebells',    label:'Kettlebells' },
  { id:'machine_cable',  label:'Machine / Cable' },
];

function buildLibraryFilters() {
  const mRow = document.getElementById('lib-muscle-row');
  const eRow = document.getElementById('lib-eq-row');
  if (!mRow || !eRow) return;
  mRow.innerHTML = MUSCLE_FILTERS.map(f =>
    `<button class="lib-filter-chip${f.id===libMuscle?' active':''}"
             onclick="setLibMuscle('${f.id}')">${f.label}</button>`
  ).join('');
  eRow.innerHTML = EQ_FILTERS.map(f =>
    `<button class="lib-eq-chip${f.id===libEq?' active':''}"
             onclick="setLibEq('${f.id}')">${f.label}</button>`
  ).join('');
}

function setLibMuscle(val) { libMuscle = val; buildLibraryFilters(); renderLibrary(); }
function setLibEq(val)     { libEq     = val; buildLibraryFilters(); renderLibrary(); }

function openLibrary() {
  document.getElementById('lib-sheet').classList.add('open');
  document.getElementById('lib-backdrop').classList.add('open');
  document.getElementById('lib-search').value = '';
  renderLibrary();
  setTimeout(() => document.getElementById('lib-search').focus(), 350);
}

function closeLibrary() {
  document.getElementById('lib-sheet').classList.remove('open');
  document.getElementById('lib-backdrop').classList.remove('open');
}

function renderLibrary() {
  const q        = (document.getElementById('lib-search').value || '').toLowerCase().trim();
  const session  = currentSession();
  const addedIds = new Set((session?.exercises || []).map(e => e.id));
  const customs  = getCustomExercises();
  let exercises  = [...customs, ...(LAROFIT_EXERCISES || [])];

  if (libMuscle !== 'all') exercises = exercises.filter(e => e.primaryMuscle === libMuscle);
  if (libEq     !== 'all') exercises = exercises.filter(e => e.equipment === libEq);
  exercises.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  if (q) {
    exercises = exercises.filter(e =>
      e.name.toLowerCase().includes(q) ||
      (e.primaryMuscle || '').includes(q) ||
      (e.secondaryMuscles || []).some(m => m.includes(q))
    );
  }

  const EQ_ICONS = {
    bodyweight:'🤸', bands:'🎽', barbell:'🏗️', bench:'🪑',
    cardio_machine:'🏃', dumbbells:'🏋️', exercise_ball:'⚽',
    ez_bar:'〰️', kettlebells:'🔔', machine_cable:'⚙️'
  };
  const isCustom = id => id && id.startsWith('cx-');

  document.getElementById('lib-results').innerHTML = exercises.length === 0
    ? `<div class="lib-empty">No exercises found.<br>Try a different search or filter.</div>`
    : exercises.map(ex => {
        const added = addedIds.has(ex.id);
        const meta  = [ex.primaryMuscle, ...(ex.secondaryMuscles||[])]
          .filter(Boolean).slice(0,2).map(m => m.replace('_',' ')).join(' · ');
        return `
          <div class="lib-ex-row${added?' already-added':''}" onclick="addExercise('${ex.id}')">
            <div class="lib-ex-icon">${EQ_ICONS[ex.equipment] || '🏋️'}</div>
            <div class="lib-ex-body">
              <div class="lib-ex-name">${escHtml(ex.name)}${isCustom(ex.id)?'<span class="custom-badge">CUSTOM</span>':''}</div>
              <div class="lib-ex-meta">${meta}</div>
            </div>
            ${isCustom(ex.id)
              ? `<button class="lib-ex-delete" onclick="deleteCustomExercise(event,'${ex.id}')">🗑</button>`
              : `<div class="lib-ex-add">${added ? '✓' : '+'}</div>`
            }
          </div>`;
      }).join('');
}

function deleteCustomExercise(e, id) {
  e.stopPropagation();
  _customsCache = _customsCache.filter(ex => ex.id !== id);
  LF.db.deleteCustomExercise(id);
  renderLibrary();
  showToast('Exercise deleted');
}

function addExercise(exId) {
  const customs = getCustomExercises();
  const ex      = customs.find(e => e.id === exId) || (LAROFIT_EXERCISES || []).find(e => e.id === exId);
  if (!ex) return;

  const session = currentSession();
  if (!session) return;

  const existing = session.exercises.findIndex(e => e.id === exId);
  if (existing >= 0) {
    session.exercises.splice(existing, 1);
    renderLibrary(); renderExList(); return;
  }

  const rt = ex.recordType || 'weight_reps';
  const defaults =
    rt === 'weight_reps'   ? { sets: 3, weight: 0, reps: 10, restSec: 60 } :
    rt === 'reps'          ? { sets: 3, reps: 10, restSec: 60 } :
    rt === 'duration'      ? { sets: 3, durationSec: 30, restSec: 60 } :
    rt === 'cardio'        ? { durationMin: 20, distance: '' } :
    rt === 'reps_duration' ? { sets: 3, reps: 10, durationSec: 30, restSec: 60 } :
                             { sets: 3, reps: 10, restSec: 60 };
  session.exercises.push({ id: ex.id, name: ex.name, primaryMuscle: ex.primaryMuscle, secondaryMuscles: ex.secondaryMuscles || [], recordType: rt, ...defaults });
  renderLibrary();
  renderExList();
  showToast(ex.name + ' added');
}

// SAVE PROGRAM
// ══════════════════════════════════════════════════════════════════════
function saveProgram() {
  flushSetupToProgram();

  if (!program.name) {
    showToast('Give your program a name first');
    document.getElementById('prog-name').focus();
    return;
  }

  program.savedAt = new Date().toISOString();

  const programs = JSON.parse(localStorage.getItem('lf_programs') || '[]');
  const idx      = programs.findIndex(p => p.id === program.id);
  if (idx >= 0) programs[idx] = program;
  else          programs.push(program);
  localStorage.setItem('lf_programs', JSON.stringify(programs));

  showToast('Program saved ✓');
  setTimeout(() => { window.location.href = 'programs.html'; }, 900);
}

  document.getElementById('custom-ex-backdrop').classList.add('show');
  document.getElementById('custom-ex-sheet').classList.add('show');
  setTimeout(() => document.getElementById('cx-name').focus(), 300);
}

function closeCustomExSheet() {
  document.getElementById('custom-ex-backdrop').classList.remove('show');
  document.getElementById('custom-ex-sheet').classList.remove('show');
}

function buildMuscleChips() {
  const el = document.getElementById('cx-muscles');
  if (!el) return;
  el.innerHTML = MUSCLES_ALL.map(m => `
    <div class="custom-ex-muscle-chip${cxSelectedMuscles.includes(m)?' sel':''}"
         onclick="toggleMuscleChip(this,'${m}')">
      ${m}
    </div>`).join('');
}

function toggleMuscleChip(el, muscle) {
  const idx = cxSelectedMuscles.indexOf(muscle);
  if (idx >= 0) { cxSelectedMuscles.splice(idx, 1); el.classList.remove('sel'); }
  else          { cxSelectedMuscles.push(muscle);   el.classList.add('sel'); }
}

function saveCustomExercise() {
  const name = document.getElementById('cx-name').value.trim();
  if (!name) { showToast('Exercise name is required'); return; }

  const ex = {
    id:         'cx-' + Date.now(),
    name,
    category:   document.getElementById('cx-category').value,
    eq:         document.getElementById('cx-eq').value,
    type:       document.getElementById('cx-type').value,
    difficulty: document.getElementById('cx-difficulty').value,
    muscles:    [...cxSelectedMuscles],
    video:      document.getElementById('cx-video').value.trim(),
    notes:      document.getElementById('cx-notes').value.trim(),
    custom:     true,
  };

  _customsCache.unshift(ex);
  LF.db.saveCustomExercise(ex);
  closeCustomExSheet();
  addExercise(ex.id);
  renderLibrary();
  showToast(ex.name + ' created and added');
}

// ══════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── RUN ──
document.addEventListener('DOMContentLoaded', init);
</script>
