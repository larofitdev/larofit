<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f0">
<title>LaroFit — Builder</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="appletouchicon.png">
<link rel="stylesheet" href="larofit.css?v=2">
<style>
/* ── BASE ── */
input, select, textarea { font-size: 16px !important; }
button, input, select, a, textarea { touch-action: manipulation; }

/* ══════════════════════════════════════════
   SCREEN 1 — PROGRAM OVERVIEW
══════════════════════════════════════════ */

/* Meta card (name, goal, weeks) */
.bldr-meta {
  margin: 14px var(--page-pad) 0;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.bldr-name-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 18px !important;
  font-weight: 700;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.bldr-name-input:focus { border-color: var(--volt-dark); }
.bldr-name-input::placeholder { color: var(--text-3); font-weight: 400; }

.bldr-meta-row {
  display: flex;
  gap: 10px;
}

.bldr-meta-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.bldr-meta-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.bldr-meta-field select {
  padding: 9px 10px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  width: 100%;
}
.bldr-meta-field select:focus { border-color: var(--volt-dark); }

/* Day list */
.bldr-days {
  margin: 14px var(--page-pad) 0;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
}

.bldr-day-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.bldr-day-row:last-child { border-bottom: none; }
.bldr-day-row:active { background: var(--bg); }
.bldr-day-row.is-rest { opacity: 0.55; cursor: default; }
.bldr-day-row.is-rest:active { background: transparent; }

.bldr-day-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--volt);
  flex-shrink: 0;
}
.bldr-day-row.is-rest .bldr-day-dot { background: var(--border-md); }

.bldr-day-info { flex: 1; min-width: 0; }
.bldr-day-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bldr-day-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bldr-day-rest-toggle {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--border-md);
  background: transparent;
  white-space: nowrap;
  flex-shrink: 0;
}
.bldr-day-rest-toggle.is-rest {
  color: var(--volt-dark);
  border-color: var(--volt-border);
  background: var(--volt-bg);
}

.bldr-day-arrow {
  color: var(--text-3);
  font-size: 18px;
  flex-shrink: 0;
}
.bldr-day-row.is-rest .bldr-day-arrow { display: none; }

/* ══════════════════════════════════════════
   SCREEN 2 — DAY EDITOR
══════════════════════════════════════════ */
#screen-day { display: none; }

.bldr-day-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px var(--page-pad) 12px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}

.bldr-back-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--text-2);
  flex-shrink: 0;
}

.bldr-day-title-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
}
.bldr-day-title-input::placeholder { color: var(--text-3); }

/* Exercise cards */
.bldr-ex-list {
  padding: 12px var(--page-pad);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bldr-ex-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
  animation: fadeUp 0.2s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.bldr-ex-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px 10px;
  border-bottom: 0.5px solid var(--border);
}

.bldr-ex-drag {
  color: var(--text-3);
  font-size: 16px;
  cursor: grab;
  flex-shrink: 0;
  padding: 4px;
  touch-action: none;
}

.bldr-ex-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bldr-ex-muscle {
  font-size: 10px;
  color: var(--text-3);
  font-family: var(--font-mono);
  white-space: nowrap;
}

.bldr-ex-del {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--danger-bg);
  color: var(--danger);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

/* Sets/reps/rest row */
.bldr-ex-params {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}

.bldr-param {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 8px;
  border-right: 0.5px solid var(--border);
}
.bldr-param:last-child { border-right: none; }

.bldr-param-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

.bldr-param-input {
  width: 100%;
  max-width: 72px;
  padding: 6px 4px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
  transition: border-color 0.15s;
}
.bldr-param-input::-webkit-inner-spin-button,
.bldr-param-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.bldr-param-input:focus { border-color: var(--volt-dark); background: var(--volt-bg); }

.bldr-param-unit {
  font-size: 9px;
  color: var(--text-3);
  margin-top: 3px;
}

/* Add exercise button */
.bldr-add-ex-btn {
  margin: 4px var(--page-pad) 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  border-radius: var(--radius);
  border: 1.5px dashed var(--border-md);
  background: transparent;
  color: var(--text-3);
  font-size: 14px;
  font-weight: 600;
  width: calc(100% - (var(--page-pad) * 2));
  transition: all 0.15s;
}
.bldr-add-ex-btn:active {
  border-color: var(--volt-dark);
  color: var(--volt-dark);
  background: var(--volt-bg);
}

/* ══════════════════════════════════════════
   LIBRARY BOTTOM SHEET
══════════════════════════════════════════ */
.lib-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 401;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  height: 88vh;
  height: 88dvh;
}
.lib-sheet.open { transform: translateY(0); }

.lib-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 400;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.lib-backdrop.open { opacity: 1; pointer-events: all; }

.lib-sheet-handle {
  width: 36px; height: 4px;
  background: var(--border-md);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

.lib-sheet-top {
  padding: 10px 16px 0;
  flex-shrink: 0;
}

.lib-sheet-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

/* Search */
.lib-search-wrap {
  position: relative;
  margin-bottom: 10px;
}
.lib-search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 16px;
  pointer-events: none;
}
.lib-search {
  width: 100%;
  padding: 10px 12px 10px 36px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
}
.lib-search:focus { border-color: var(--volt-dark); }

/* Filter row: muscle group tabs */
.lib-filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  border-bottom: 0.5px solid var(--border);
  margin: 0 -16px;
  padding-left: 16px;
  padding-right: 16px;
}
.lib-filter-row::-webkit-scrollbar { display: none; }

.lib-filter-chip {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border-md);
  background: transparent;
  color: var(--text-2);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.lib-filter-chip.active {
  background: var(--bg-dark);
  color: var(--volt);
  border-color: var(--bg-dark);
}

/* Equipment filter */
.lib-eq-row {
  display: flex;
  gap: 6px;
  padding: 8px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 0.5px solid var(--border);
  margin: 0 -16px;
  flex-shrink: 0;
}
.lib-eq-row::-webkit-scrollbar { display: none; }

.lib-eq-chip {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border-md);
  background: transparent;
  color: var(--text-3);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.lib-eq-chip.active {
  background: var(--volt-bg);
  color: var(--volt-dark);
  border-color: var(--volt-border);
}

/* Exercise list */
.lib-ex-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

.lib-ex-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.lib-ex-row:last-child { border-bottom: none; }
.lib-ex-row:active { background: var(--bg); }

.lib-ex-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
  color: var(--text-3);
}

.lib-ex-body { flex: 1; min-width: 0; }
.lib-ex-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lib-ex-meta {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
  font-family: var(--font-mono);
}

.lib-ex-add {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--volt);
  color: var(--bg-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.lib-ex-row:active .lib-ex-add { transform: scale(0.88); }

.lib-ex-row.already-added .lib-ex-add {
  background: var(--success-bg);
  color: var(--success);
  font-size: 14px;
}

.lib-empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}

/* ── TOAST ── */
.lf-toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg-dark); color: var(--volt);
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 13px; font-weight: 600;
  font-family: var(--font-mono);
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 500;
  border: 1px solid var(--volt-border);
}
.lf-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SAVE FOOTER ── */
.bldr-save-footer {
  padding: 14px var(--page-pad);
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  border-top: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  bottom: var(--nav-h);
  z-index: 50;
}
/* ── CREATE CUSTOM EXERCISE SHEET ── */
.custom-ex-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 310;
}
.custom-ex-backdrop.show { display: block; }
.custom-ex-sheet {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card); border-radius: 20px 20px 0 0;
  z-index: 311; max-height: 92vh; overflow-y: auto;
  padding: 0 0 env(safe-area-inset-bottom,16px);
}
.custom-ex-sheet.show { display: block; }
.custom-ex-handle {
  width: 36px; height: 4px; background: var(--border-md);
  border-radius: 2px; margin: 12px auto 0;
}
.custom-ex-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border);
}
.custom-ex-header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.custom-ex-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg-dark); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 16px;
}
.custom-ex-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.custom-ex-label {
  display: block; font-size: 11px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--font-mono);
  margin-bottom: 4px;
}
.custom-ex-input, .custom-ex-select, .custom-ex-textarea {
  width: 100%; padding: 10px 12px;
  background: var(--bg-dark); border: 1px solid var(--border-md);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 15px; font-family: var(--font-body);
  outline: none; box-sizing: border-box;
}
.custom-ex-input:focus, .custom-ex-select:focus, .custom-ex-textarea:focus {
  border-color: var(--volt-dark);
}
.custom-ex-select { appearance: none; -webkit-appearance: none; }
.custom-ex-textarea { resize: none; height: 72px; line-height: 1.5; }
.custom-ex-muscles { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 2px; }
.custom-ex-muscle-chip {
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid var(--border-md);
  background: var(--bg-dark); color: var(--text-2);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.custom-ex-muscle-chip.sel {
  background: var(--volt-bg); border-color: var(--volt-dark); color: var(--volt-dark);
}
.custom-ex-save-btn {
  margin: 4px 16px 16px; padding: 14px;
  background: var(--volt); color: #000;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 800; font-family: var(--font-body);
  cursor: pointer; letter-spacing: 0.04em;
}
.lib-create-row {
  padding: 14px 16px; border-top: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.lib-create-row:active { background: var(--bg-dark); }
.lib-create-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--volt-bg); border: 1px solid var(--volt-dark);
  display: flex; align-items: center; justify-content: center;
  color: var(--volt-dark); font-size: 18px; flex-shrink: 0;
}
.lib-create-label { font-size: 14px; font-weight: 600; color: var(--volt-dark); }
.lib-create-sub   { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.custom-badge {
  font-size: 10px; font-weight: 700; color: var(--volt-dark);
  background: var(--volt-bg); border: 1px solid var(--volt-dark);
  border-radius: 4px; padding: 1px 5px; margin-left: 6px;
  font-family: var(--font-mono); vertical-align: middle;
}
</style>
</head>
<body>

<script src="larofit-exercises.js"></script>
<script>window.LF_PAGE = 'build';</script>
<script src="larofit-nav.js"></script>

<!-- ══════════════════════════════════════
     SCREEN 1 — PROGRAM OVERVIEW
══════════════════════════════════════ -->
<main id="screen-overview">

  <div class="lf-header">
    <div class="lf-header-inner">
      <button class="btn btn-ghost btn-sm" onclick="goBack()" style="padding:8px 4px;">
        <i class="ti ti-arrow-left" style="font-size:20px;"></i>
      </button>
      <div class="lf-header-title" id="overview-title">NEW PROGRAM</div>
      <button class="btn btn-volt btn-sm" onclick="saveProgram()">Save</button>
    </div>
  </div>

  <!-- Program metadata -->
  <div class="bldr-meta">
    <input
      class="bldr-name-input"
      type="text"
      id="prog-name"
      placeholder="Program name…"
      maxlength="60"
      oninput="updateOverviewTitle()"
    >
    <div class="bldr-meta-row">
      <div class="bldr-meta-field">
        <div class="bldr-meta-label">Goal</div>
        <select id="prog-goal">
          <option value="strength">💪 Strength</option>
          <option value="hypertrophy" selected>🏋️ Muscle Growth</option>
          <option value="weightloss">🔥 Weight Loss</option>
          <option value="endurance">🏃 Endurance</option>
          <option value="general">⭐ General Fitness</option>
          <option value="athletic">🏅 Athletic Performance</option>
        </select>
      </div>
      <div class="bldr-meta-field">
        <div class="bldr-meta-label">Weeks</div>
        <select id="prog-weeks">
          <option value="4">4 weeks</option>
          <option value="6">6 weeks</option>
          <option value="8" selected>8 weeks</option>
          <option value="10">10 weeks</option>
          <option value="12">12 weeks</option>
          <option value="16">16 weeks</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Section label -->
  <div class="lf-section-label">Schedule</div>

  <!-- Day rows -->
  <div class="bldr-days" id="day-list">
    <!-- injected by JS -->
  </div>

  <!-- Save footer -->
  <div class="bldr-save-footer">
    <button class="btn btn-volt btn-full btn-lg" onclick="saveProgram()">Save Program</button>
  </div>

</main>

<!-- ══════════════════════════════════════
     SCREEN 2 — DAY EDITOR
══════════════════════════════════════ -->
<main id="screen-day" style="display:none;">

  <div class="bldr-day-header">
    <button class="bldr-back-btn" onclick="backToOverview()">‹</button>
    <input
      class="bldr-day-title-input"
      type="text"
      id="day-title-input"
      placeholder="Day name…"
      maxlength="40"
    >
    <button class="btn btn-volt btn-sm" onclick="saveProgram()">Save</button>
  </div>

  <div class="bldr-ex-list" id="ex-list">
    <!-- injected by JS -->
  </div>

  <button class="bldr-add-ex-btn" onclick="openLibrary()">
    <i class="ti ti-plus" style="font-size:18px;"></i>
    Add exercise
  </button>

</main>

<!-- ══════════════════════════════════════
     LIBRARY BOTTOM SHEET
══════════════════════════════════════ -->
<div class="lib-backdrop" id="lib-backdrop" onclick="closeLibrary()"></div>
<div class="lib-sheet" id="lib-sheet">
  <div class="lib-sheet-handle"></div>
  <div class="lib-sheet-top">
    <div class="lib-sheet-title">Add Exercise</div>

    <!-- Search -->
    <div class="lib-search-wrap">
      <i class="ti ti-search lib-search-icon"></i>
      <input
        class="lib-search"
        type="text"
        id="lib-search"
        placeholder="Search exercises…"
        oninput="renderLibrary()"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>

    <!-- Muscle group chips -->
    <div class="lib-filter-row" id="lib-muscle-row">
      <!-- injected by JS -->
    </div>

    <!-- Equipment chips -->
    <div class="lib-eq-row" id="lib-eq-row">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- Results -->
  <div class="lib-ex-list" id="lib-results">
    <!-- injected by JS -->
  </div>
</div>

<!-- TOAST -->
<div class="lf-toast" id="toast"></div>

<!-- ══════════════════════════════════════
     CUSTOM EXERCISE SHEET
══════════════════════════════════════ -->
<div class="custom-ex-backdrop" id="custom-ex-backdrop" onclick="closeCustomExSheet()"></div>
<div class="custom-ex-sheet" id="custom-ex-sheet">
  <div class="custom-ex-handle"></div>
  <div class="custom-ex-header">
    <div class="custom-ex-header-title">Create Custom Exercise</div>
    <button class="custom-ex-close" onclick="closeCustomExSheet()">✕</button>
  </div>
  <div class="custom-ex-body">
    <div class="custom-ex-field">
      <label class="custom-ex-label">Exercise Name *</label>
      <input class="custom-ex-input" id="cx-name" type="text" placeholder="e.g. Banded Hip Thrust" autocomplete="off">
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Category</label>
      <select class="custom-ex-select" id="cx-category">
        <option value="chest">Chest</option>
        <option value="back">Back</option>
        <option value="shoulders">Shoulders</option>
        <option value="biceps">Biceps</option>
        <option value="triceps">Triceps</option>
        <option value="legs" selected>Legs</option>
        <option value="core">Core</option>
        <option value="fullbody">Full body</option>
        <option value="cardio">Cardio</option>
        <option value="yoga">Yoga</option>
        <option value="stretching">Stretching</option>
        <option value="recovery">Recovery</option>
      </select>
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Equipment</label>
      <select class="custom-ex-select" id="cx-eq">
        <option value="db">Dumbbell</option>
        <option value="bb">Barbell</option>
        <option value="mc">Machine / Cable</option>
        <option value="bw" selected>Bodyweight</option>
        <option value="kb">Kettlebell</option>
        <option value="band">Resistance Band</option>
        <option value="cd">Cardio Machine</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Type</label>
      <select class="custom-ex-select" id="cx-type">
        <option value="strength" selected>Strength</option>
        <option value="cardio">Cardio</option>
        <option value="timed_bodyweight">Timed / Bodyweight</option>
        <option value="hiit">HIIT</option>
        <option value="yoga">Yoga</option>
        <option value="stretch">Stretch</option>
        <option value="recovery">Recovery</option>
      </select>
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Difficulty</label>
      <select class="custom-ex-select" id="cx-difficulty">
        <option value="beginner">Beginner</option>
        <option value="intermediate" selected>Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Muscles Targeted</label>
      <div class="custom-ex-muscles" id="cx-muscles"></div>
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Video URL (optional)</label>
      <input class="custom-ex-input" id="cx-video" type="url" placeholder="https://youtube.com/...">
    </div>
    <div class="custom-ex-field">
      <label class="custom-ex-label">Notes (optional)</label>
      <textarea class="custom-ex-textarea" id="cx-notes" placeholder="Form cues, tips, variations…"></textarea>
    </div>
  </div>
  <button class="custom-ex-save-btn" onclick="saveCustomExercise()">Save Exercise</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

let program = null;   // the program object being edited
let editingDay = -1;  // index of the day currently being edited (Screen 2)

// Library filter state
let libMuscle = 'all';
let libEq     = 'all';

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
function init() {
  const params = new URLSearchParams(location.search);
  const id     = params.get('id') || (() => {
    // programs.html passes id via localStorage store (lf_editing_program_id)
    try {
      const v = localStorage.getItem('lf_editing_program_id');
      if (v) { localStorage.removeItem('lf_editing_program_id'); return JSON.parse(v); }
    } catch {}
    return null;
  })();

  if (id) {
    const programs = JSON.parse(localStorage.getItem('lf_programs') || '[]');
    program = programs.find(p => p.id === id);
    if (!program) { showToast('Program not found'); goBack(); return; }
    loadProgramIntoForm();
  } else {
    program = makeBlankProgram();
  }

  renderDayList();
  buildLibraryFilters();
}

function makeBlankProgram() {
  return {
    id:          'prog_' + Date.now(),
    name:        '',
    goal:        'hypertrophy',
    weeks:       8,
    aiGenerated: false,
    savedAt:     null,
    days: DAY_NAMES.map((name, i) => ({
      name,
      rest: i >= 5, // Sat+Sun default rest
      exercises: [],
    })),
  };
}

function loadProgramIntoForm() {
  document.getElementById('prog-name').value  = program.name  || '';
  document.getElementById('prog-goal').value  = program.goal  || 'hypertrophy';
  document.getElementById('prog-weeks').value = program.weeks || 8;
  updateOverviewTitle();
}

function updateOverviewTitle() {
  const val = document.getElementById('prog-name').value.trim();
  document.getElementById('overview-title').textContent = val || 'NEW PROGRAM';
}

// ══════════════════════════════════════════════════════════════════════
// SCREEN 1 — DAY LIST
// ══════════════════════════════════════════════════════════════════════
function renderDayList() {
  const list = document.getElementById('day-list');
  list.innerHTML = program.days.map((day, i) => {
    const exCount  = day.exercises.length;
    const subText  = day.rest
      ? 'Rest day'
      : exCount === 0
        ? 'No exercises yet — tap to add'
        : exCount + ' exercise' + (exCount !== 1 ? 's' : '');

    return `
      <div class="bldr-day-row${day.rest ? ' is-rest' : ''}"
           onclick="${day.rest ? '' : `editDay(${i})`}"
           id="day-row-${i}">
        <div class="bldr-day-dot"></div>
        <div class="bldr-day-info">
          <div class="bldr-day-name">${escHtml(day.name)}</div>
          <div class="bldr-day-sub">${subText}</div>
        </div>
        <button class="bldr-day-rest-toggle${day.rest ? ' is-rest' : ''}"
                onclick="event.stopPropagation(); toggleRest(${i})"
                aria-label="${day.rest ? 'Mark as workout' : 'Mark as rest'}">
          ${day.rest ? '+ Workout' : 'Rest'}
        </button>
        ${day.rest ? '' : '<div class="bldr-day-arrow">›</div>'}
      </div>`;
  }).join('');
}

function toggleRest(i) {
  program.days[i].rest = !program.days[i].rest;
  renderDayList();
}

// ══════════════════════════════════════════════════════════════════════
// SCREEN 2 — DAY EDITOR
// ══════════════════════════════════════════════════════════════════════
function editDay(i) {
  editingDay = i;
  const day  = program.days[i];

  document.getElementById('day-title-input').value = day.name || '';
  document.getElementById('screen-overview').style.display = 'none';
  document.getElementById('screen-day').style.display      = 'block';
  window.scrollTo(0, 0);
  renderExList();
}

function backToOverview() {
  // Flush day name edits back to program
  if (editingDay >= 0) {
    const nameVal = document.getElementById('day-title-input').value.trim();
    if (nameVal) program.days[editingDay].name = nameVal;
  }
  editingDay = -1;
  document.getElementById('screen-day').style.display      = 'none';
  document.getElementById('screen-overview').style.display = 'block';
  window.scrollTo(0, 0);
  renderDayList();
}

function renderExList() {
  const day  = program.days[editingDay];
  const list = document.getElementById('ex-list');

  if (!day || day.exercises.length === 0) {
    list.innerHTML = `
      <div style="padding:32px 0 8px;text-align:center;">
        <div style="font-size:32px;opacity:0.25;margin-bottom:8px;">🏋️</div>
        <div style="font-size:14px;color:var(--text-3);font-weight:500;">No exercises yet</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:4px;">Tap "Add exercise" below</div>
      </div>`;
    return;
  }

  list.innerHTML = day.exercises.map((ex, ei) => `
    <div class="bldr-ex-card" id="ex-card-${ei}">
      <div class="bldr-ex-card-header">
        <span class="bldr-ex-drag" title="Drag to reorder">⠿</span>
        <div class="bldr-ex-info" style="flex:1;min-width:0;">
          <div class="bldr-ex-name">${escHtml(ex.name)}</div>
          <div class="bldr-ex-muscle">${(ex.muscles || []).slice(0,2).join(' · ')}</div>
        </div>
        <button class="bldr-ex-del" onclick="removeExercise(${ei})" aria-label="Remove exercise">✕</button>
      </div>
      <div class="bldr-ex-params">
        <div class="bldr-param">
          <div class="bldr-param-label">Sets</div>
          <input class="bldr-param-input" type="number"
            value="${ex.sets}" min="1" max="20"
            onchange="updateExParam(${ei},'sets',this.value)"
            aria-label="Sets">
          <div class="bldr-param-unit">sets</div>
        </div>
        <div class="bldr-param">
          <div class="bldr-param-label">Reps</div>
          <input class="bldr-param-input" type="number"
            value="${ex.reps}" min="1" max="100"
            onchange="updateExParam(${ei},'reps',this.value)"
            aria-label="Reps">
          <div class="bldr-param-unit">reps</div>
        </div>
        <div class="bldr-param">
          <div class="bldr-param-label">Rest</div>
          <input class="bldr-param-input" type="number"
            value="${ex.restSec}" min="0" max="600" step="15"
            onchange="updateExParam(${ei},'restSec',this.value)"
            aria-label="Rest seconds">
          <div class="bldr-param-unit">sec</div>
        </div>
      </div>
    </div>`).join('');

  initDrag();
}

function updateExParam(ei, key, val) {
  const day = program.days[editingDay];
  if (!day || !day.exercises[ei]) return;
  day.exercises[ei][key] = parseInt(val) || 0;
}

function removeExercise(ei) {
  program.days[editingDay].exercises.splice(ei, 1);
  renderExList();
}

// ══════════════════════════════════════════════════════════════════════
// DRAG TO REORDER (touch-friendly)
// ══════════════════════════════════════════════════════════════════════
function initDrag() {
  const list = document.getElementById('ex-list');
  let dragEl = null, startY = 0, startIdx = -1, curIdx = -1;

  list.querySelectorAll('.bldr-ex-drag').forEach((handle, i) => {
    handle.addEventListener('touchstart', e => {
      dragEl   = handle.closest('.bldr-ex-card');
      startIdx = curIdx = i;
      startY   = e.touches[0].clientY;
      dragEl.style.opacity = '0.7';
      dragEl.style.zIndex  = '10';
      e.preventDefault();
    }, { passive: false });
  });

  list.addEventListener('touchmove', e => {
    if (!dragEl) return;
    const dy    = e.touches[0].clientY - startY;
    const cards = [...list.querySelectorAll('.bldr-ex-card')];
    const cardH = dragEl.offsetHeight + 10;
    const newIdx = Math.max(0, Math.min(cards.length - 1, startIdx + Math.round(dy / cardH)));

    if (newIdx !== curIdx) {
      const exes = program.days[editingDay].exercises;
      const moved = exes.splice(curIdx, 1)[0];
      exes.splice(newIdx, 0, moved);
      curIdx = newIdx;
      renderExList();
      // Re-bind — new elements
      initDrag();
    }
    e.preventDefault();
  }, { passive: false });

  list.addEventListener('touchend', () => {
    if (dragEl) {
      dragEl.style.opacity = '';
      dragEl.style.zIndex  = '';
      dragEl = null;
    }
  });
}

// ══════════════════════════════════════════════════════════════════════
// LIBRARY SHEET
// ══════════════════════════════════════════════════════════════════════
const MUSCLE_FILTERS = [
  { id:'all',       label:'All' },
  { id:'chest',     label:'Chest' },
  { id:'back',      label:'Back' },
  { id:'shoulders', label:'Shoulders' },
  { id:'biceps',    label:'Biceps' },
  { id:'triceps',   label:'Triceps' },
  { id:'legs',      label:'Legs' },
  { id:'core',      label:'Core' },
  { id:'fullbody',  label:'Full body' },
  { id:'cardio',    label:'Cardio' },
];

const EQ_FILTERS = [
  { id:'all',  label:'All equipment' },
  { id:'db',   label:'Dumbbells' },
  { id:'bb',   label:'Barbell' },
  { id:'mc',   label:'Machine' },
  { id:'bw',   label:'Bodyweight' },
  { id:'kb',   label:'Kettlebell' },
  { id:'band', label:'Bands' },
  { id:'cd',   label:'Cable' },
];

function buildLibraryFilters() {
  // Muscle chips
  document.getElementById('lib-muscle-row').innerHTML = MUSCLE_FILTERS.map(f =>
    `<button class="lib-filter-chip${f.id === libMuscle ? ' active' : ''}"
             onclick="setLibMuscle('${f.id}')">${f.label}</button>`
  ).join('');

  // Equipment chips
  document.getElementById('lib-eq-row').innerHTML = EQ_FILTERS.map(f =>
    `<button class="lib-eq-chip${f.id === libEq ? ' active' : ''}"
             onclick="setLibEq('${f.id}')">${f.label}</button>`
  ).join('');
}

function setLibMuscle(val) {
  libMuscle = val;
  buildLibraryFilters();
  renderLibrary();
}

function setLibEq(val) {
  libEq = val;
  buildLibraryFilters();
  renderLibrary();
}

function openLibrary() {
  document.getElementById('lib-sheet').classList.add('open');
  document.getElementById('lib-backdrop').classList.add('open');
  document.getElementById('lib-search').value = '';
  renderLibrary();
  setTimeout(() => document.getElementById('lib-search').focus(), 350);
}

function closeLibrary() {
  document.getElementById('lib-sheet').classList.remove('open');
  document.getElementById('lib-backdrop').classList.remove('open');
}

function renderLibrary() {
  const q      = (document.getElementById('lib-search').value || '').toLowerCase().trim();
  const day    = program.days[editingDay];
  const addedIds = new Set((day?.exercises || []).map(e => e.id));

  const customs  = getCustomExercises();
  let exercises  = [...customs, ...(LAROFIT_EXERCISES || [])];

  // Filter by muscle/category
  if (libMuscle !== 'all') {
    exercises = exercises.filter(e => e.category === libMuscle);
  }

  // Filter by equipment
  if (libEq !== 'all') {
    exercises = exercises.filter(e => e.eq === libEq);
  }

  // Filter by search
  if (q) {
    exercises = exercises.filter(e =>
      e.name.toLowerCase().includes(q) ||
      (e.muscles || []).some(m => m.toLowerCase().includes(q))
    );
  }

  const container = document.getElementById('lib-results');
  const EQ_ICONS  = { db:'🏋️', bb:'🏗️', mc:'⚙️', bw:'🤸', kb:'🔔', band:'🎽', cd:'🔗', yoga:'🧘', rc:'🏃' };
  const isCustom  = id => id && id.startsWith('cx-');

  const rowsHTML = exercises.length === 0
    ? `<div class="lib-empty">No exercises found.<br>Try a different search or filter.</div>`
    : exercises.map(ex => {
        const added = addedIds.has(ex.id);
        return `
          <div class="lib-ex-row${added ? ' already-added' : ''}" onclick="addExercise('${ex.id}')">
            <div class="lib-ex-icon">${EQ_ICONS[ex.eq] || '🏋️'}</div>
            <div class="lib-ex-body">
              <div class="lib-ex-name">${escHtml(ex.name)}${isCustom(ex.id) ? '<span class="custom-badge">CUSTOM</span>' : ''}</div>
              <div class="lib-ex-meta">${(ex.muscles || []).slice(0,2).join(' · ')}</div>
            </div>
            <div class="lib-ex-add">${added ? '✓' : '+'}</div>
          </div>`;
      }).join('');

  container.innerHTML = rowsHTML + `
    <div class="lib-create-row" onclick="openCustomExSheet()">
      <div class="lib-create-icon">+</div>
      <div>
        <div class="lib-create-label">Create custom exercise</div>
        <div class="lib-create-sub">Can't find it? Add your own</div>
      </div>
    </div>`;
}

function addExercise(exId) {
  const customs = getCustomExercises();
  const ex      = customs.find(e => e.id === exId) || (LAROFIT_EXERCISES || []).find(e => e.id === exId);
  if (!ex) return;

  const day = program.days[editingDay];
  if (!day) return;

  // Already added — remove it (toggle)
  const existing = day.exercises.findIndex(e => e.id === exId);
  if (existing >= 0) {
    day.exercises.splice(existing, 1);
    renderLibrary();
    renderExList();
    return;
  }

  day.exercises.push({
    id:      ex.id,
    name:    ex.name,
    muscles: ex.muscles || [],
    sets:    3,
    reps:    10,
    restSec: 60,
  });

  renderLibrary();
  renderExList();
  showToast(ex.name + ' added');
}

// ══════════════════════════════════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════════════════════════════════
function saveProgram() {
  // Flush any in-progress day edit
  if (editingDay >= 0) {
    const nameVal = document.getElementById('day-title-input').value.trim();
    if (nameVal) program.days[editingDay].name = nameVal;
  }

  const name = document.getElementById('prog-name').value.trim();
  if (!name) {
    showToast('Give your program a name first');
    document.getElementById('prog-name').focus();
    return;
  }

  program.name    = name;
  program.goal    = document.getElementById('prog-goal').value;
  program.weeks   = parseInt(document.getElementById('prog-weeks').value);
  program.savedAt = new Date().toISOString();

  const programs = JSON.parse(localStorage.getItem('lf_programs') || '[]');
  const idx      = programs.findIndex(p => p.id === program.id);
  if (idx >= 0) programs[idx] = program;
  else          programs.push(program);
  localStorage.setItem('lf_programs', JSON.stringify(programs));

  showToast('Program saved ✓');
  setTimeout(() => { window.location.href = 'programs.html'; }, 900);
}

// ══════════════════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════════════════
function goBack() {
  if (editingDay >= 0) { backToOverview(); return; }
  window.location.href = 'programs.html';
}

// ══════════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── CUSTOM EXERCISES ──────────────────────────────────────────
// MUSCLES_ALL is already declared in larofit-exercises.js

function getCustomExercises() {
  try { return JSON.parse(localStorage.getItem('lf_custom_exercises') || '[]'); } catch { return []; }
}

function saveCustomExercises(arr) {
  localStorage.setItem('lf_custom_exercises', JSON.stringify(arr));
}

let cxSelectedMuscles = [];

function openCustomExSheet() {
  cxSelectedMuscles = [];
  document.getElementById('cx-name').value        = '';
  document.getElementById('cx-video').value       = '';
  document.getElementById('cx-notes').value       = '';
  document.getElementById('cx-category').value    = 'legs';
  document.getElementById('cx-eq').value          = 'bw';
  document.getElementById('cx-type').value        = 'strength';
  document.getElementById('cx-difficulty').value  = 'intermediate';
  buildMuscleChips('cx-muscles', cxSelectedMuscles);
  document.getElementById('custom-ex-backdrop').classList.add('show');
  document.getElementById('custom-ex-sheet').classList.add('show');
  setTimeout(() => document.getElementById('cx-name').focus(), 300);
}

function closeCustomExSheet() {
  document.getElementById('custom-ex-backdrop').classList.remove('show');
  document.getElementById('custom-ex-sheet').classList.remove('show');
}

function buildMuscleChips(containerId, selectedArr) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = MUSCLES_ALL.map(m => `
    <div class="custom-ex-muscle-chip${selectedArr.includes(m) ? ' sel' : ''}"
         onclick="toggleMuscleChip(this,'${m}',cxSelectedMuscles)">
      ${m}
    </div>`).join('');
}

function toggleMuscleChip(el, muscle, arr) {
  const idx = arr.indexOf(muscle);
  if (idx >= 0) { arr.splice(idx, 1); el.classList.remove('sel'); }
  else          { arr.push(muscle);   el.classList.add('sel'); }
}

function saveCustomExercise() {
  const name = document.getElementById('cx-name').value.trim();
  if (!name) { showToast('Exercise name is required'); return; }

  const ex = {
    id:         'cx-' + Date.now(),
    name,
    category:   document.getElementById('cx-category').value,
    eq:         document.getElementById('cx-eq').value,
    type:       document.getElementById('cx-type').value,
    difficulty: document.getElementById('cx-difficulty').value,
    muscles:    [...cxSelectedMuscles],
    video:      document.getElementById('cx-video').value.trim(),
    notes:      document.getElementById('cx-notes').value.trim(),
    custom:     true,
  };

  const arr = getCustomExercises();
  arr.push(ex);
  saveCustomExercises(arr);
  closeCustomExSheet();
  addExercise(ex.id);
  renderLibrary();
  showToast(name + ' created and added');
}

// ── RUN ──
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
