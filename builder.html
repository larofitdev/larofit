<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f0">
<title>LaroFit — Builder</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="appletouchicon.png">
<link rel="stylesheet" href="larofit.css?v=2">
<style>
input, select, textarea { font-size: 16px !important; }
button, input, select, a, textarea { touch-action: manipulation; }

/* ══════════════════════════════════════════
   SCREEN 1 — PROGRAM SETUP
══════════════════════════════════════════ */
.setup-card {
  margin: 14px var(--page-pad) 0;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.setup-name-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 18px !important;
  font-weight: 700;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.setup-name-input:focus { border-color: var(--volt-dark); }
.setup-name-input::placeholder { color: var(--text-3); font-weight: 400; }
.setup-row { display: flex; gap: 10px; }
.setup-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.setup-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.setup-field select,
.setup-field input[type="date"] {
  padding: 9px 10px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
}
.setup-field select:focus,
.setup-field input[type="date"]:focus { border-color: var(--volt-dark); }

/* ══════════════════════════════════════════
   SCREEN 2 — CALENDAR
══════════════════════════════════════════ */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--page-pad) 8px;
}
.cal-nav-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-2);
  cursor: pointer;
}
.cal-nav-btn:disabled { opacity: 0.3; cursor: default; }
.cal-month-label {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--text);
}

/* Day-of-week header */
.cal-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 var(--page-pad);
  margin-bottom: 4px;
}
.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.08em;
  padding: 4px 0;
  font-family: var(--font-mono);
}

/* Calendar grid */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  padding: 0 var(--page-pad);
}

.cal-cell {
  aspect-ratio: 1 / 1.15;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border);
  background: var(--bg-card);
  display: flex;
  flex-direction: column;
  padding: 4px 5px 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
  min-height: 52px;
}
.cal-cell:active { background: var(--bg-card2); }
.cal-cell.empty {
  background: transparent;
  border-color: transparent;
  cursor: default;
  pointer-events: none;
}
.cal-cell.out-of-range {
  opacity: 0.3;
  cursor: default;
  pointer-events: none;
}
.cal-cell.is-today {
  border-color: var(--volt-dark);
  border-width: 1.5px;
}
.cal-cell.has-workout {
  background: var(--bg-dark);
  border-color: var(--bg-dark);
}
.cal-cell.paste-target {
  border-color: var(--volt);
  border-width: 1.5px;
  animation: calPulse 1s ease infinite;
}
@keyframes calPulse {
  0%, 100% { border-color: var(--volt); }
  50%       { border-color: var(--volt-dark); }
}

.cal-date-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  line-height: 1;
  flex-shrink: 0;
}
.cal-cell.has-workout .cal-date-num { color: rgba(255,255,255,0.5); }
.cal-cell.is-today .cal-date-num    { color: var(--volt-dark); }

.cal-workout-name {
  font-size: 9px;
  font-weight: 700;
  color: var(--volt);
  line-height: 1.2;
  margin-top: 3px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  word-break: break-word;
}

.cal-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--volt);
  margin-top: auto;
  flex-shrink: 0;
}

/* Paste mode banner */
.paste-banner {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 60px);
  left: var(--page-pad);
  right: var(--page-pad);
  background: var(--bg-dark);
  border: 1px solid var(--volt);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  z-index: 150;
  box-shadow: var(--shadow-lg);
  animation: slideDown 0.25s ease;
}
@keyframes slideDown {
  from { transform: translateY(-12px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
.paste-banner-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-inv);
  flex: 1;
}
.paste-banner-text span { color: var(--volt); }
.paste-cancel-btn {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-3);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  padding: 4px 0;
}

/* ══════════════════════════════════════════
   SCREEN 3 — DAY EDITOR (kept from v1)
══════════════════════════════════════════ */
.bldr-day-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px var(--page-pad) 12px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
.bldr-back-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--text-2);
  flex-shrink: 0;
}
.bldr-day-title-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
}
.bldr-day-title-input::placeholder { color: var(--text-3); }
.bldr-ex-list {
  padding: 12px var(--page-pad);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bldr-ex-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
  animation: fadeUp 0.2s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bldr-ex-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px 10px;
  border-bottom: 0.5px solid var(--border);
}
.bldr-ex-drag {
  color: var(--text-3);
  font-size: 16px;
  cursor: grab;
  flex-shrink: 0;
  padding: 4px;
  touch-action: none;
}
.bldr-ex-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bldr-ex-muscle {
  font-size: 10px;
  color: var(--text-3);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.bldr-ex-del {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--danger-bg);
  color: var(--danger);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  border: none;
  cursor: pointer;
}
.bldr-ex-params {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.bldr-param {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 8px;
  border-right: 0.5px solid var(--border);
}
.bldr-param:last-child { border-right: none; }
.bldr-param-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.bldr-param-input {
  width: 100%;
  max-width: 72px;
  padding: 6px 4px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
  transition: border-color 0.15s;
}
.bldr-param-input::-webkit-inner-spin-button,
.bldr-param-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.bldr-param-input:focus { border-color: var(--volt-dark); background: var(--volt-bg); }
.bldr-param-unit {
  font-size: 9px;
  color: var(--text-3);
  margin-top: 3px;
}
.bldr-add-ex-btn {
  margin: 4px var(--page-pad) 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  border-radius: var(--radius);
  border: 1.5px dashed var(--border-md);
  background: transparent;
  color: var(--text-3);
  font-size: 14px;
  font-weight: 600;
  width: calc(100% - (var(--page-pad) * 2));
  cursor: pointer;
  transition: all 0.15s;
}
.bldr-add-ex-btn:active {
  border-color: var(--volt-dark);
  color: var(--volt-dark);
  background: var(--volt-bg);
}

/* ══════════════════════════════════════════
   LIBRARY BOTTOM SHEET
══════════════════════════════════════════ */
.lib-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 401;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  height: 88vh;
  height: 88dvh;
}
.lib-sheet.open { transform: translateY(0); }
.lib-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 400;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.lib-backdrop.open { opacity: 1; pointer-events: all; }
.lib-sheet-handle {
  width: 36px; height: 4px;
  background: var(--border-md);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}
.lib-sheet-top {
  padding: 10px 16px 0;
  flex-shrink: 0;
  border-bottom: 0.5px solid var(--border);
}
.lib-sheet-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.lib-search-wrap { position: relative; margin-bottom: 10px; }
.lib-search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3); font-size: 16px; pointer-events: none;
}
.lib-search {
  width: 100%;
  padding: 10px 12px 10px 36px;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--text); outline: none;
}
.lib-search:focus { border-color: var(--volt-dark); }
.lib-filter-row {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 10px; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  border-bottom: 0.5px solid var(--border);
  margin: 0 -16px; padding-left: 16px; padding-right: 16px;
}
.lib-filter-row::-webkit-scrollbar { display: none; }
.lib-filter-chip {
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border-md);
  background: transparent; color: var(--text-2);
  white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
}
.lib-filter-chip.active {
  background: var(--bg-dark); color: var(--volt); border-color: var(--bg-dark);
}
.lib-eq-row {
  display: flex; gap: 6px; padding: 8px 16px;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 0.5px solid var(--border);
  margin: 0 -16px; flex-shrink: 0;
}
.lib-eq-row::-webkit-scrollbar { display: none; }
.lib-eq-chip {
  padding: 5px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  border: 1px solid var(--border-md);
  background: transparent; color: var(--text-3);
  white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
}
.lib-eq-chip.active {
  background: var(--volt-bg); color: var(--volt-dark); border-color: var(--volt-border);
}
.lib-ex-list {
  flex: 1; overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.lib-ex-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.lib-ex-row:last-child { border-bottom: none; }
.lib-ex-row:active { background: var(--bg); }
.lib-ex-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--bg); border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; color: var(--text-3);
}
.lib-ex-body { flex: 1; min-width: 0; }
.lib-ex-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lib-ex-meta { font-size: 10px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }
.lib-ex-add {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--volt); color: var(--bg-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; flex-shrink: 0; transition: transform 0.15s;
}
.lib-ex-row:active .lib-ex-add { transform: scale(0.88); }
.lib-ex-row.already-added .lib-ex-add {
  background: var(--success-bg); color: var(--success); font-size: 14px;
}
.lib-empty { padding: 48px 24px; text-align: center; color: var(--text-3); font-size: 14px; }
.lib-create-row {
  padding: 14px 16px; border-top: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.lib-create-row:active { background: var(--bg-dark); }
.lib-create-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--volt-bg); border: 1px solid var(--volt-dark);
  display: flex; align-items: center; justify-content: center;
  color: var(--volt-dark); font-size: 18px; flex-shrink: 0;
}
.lib-create-label { font-size: 14px; font-weight: 600; color: var(--volt-dark); }
.lib-create-sub   { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* ── DAY ACTION SHEET ── */
.day-action-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.day-action-overlay.open { opacity: 1; pointer-events: all; }
.day-action-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  padding: 0 var(--page-pad) calc(env(safe-area-inset-bottom, 0px) + 20px);
}
.day-action-sheet.open { transform: translateY(0); }
.day-action-handle {
  width: 36px; height: 4px; background: var(--border-md);
  border-radius: 2px; margin: 12px auto 0;
}
.day-action-date {
  font-size: 12px; font-weight: 700; color: var(--text-3);
  text-align: center; padding: 12px 0 4px;
  font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;
}
.day-action-name {
  font-size: 18px; font-weight: 700; color: var(--text);
  text-align: center; padding-bottom: 14px;
  border-bottom: 0.5px solid var(--border); margin-bottom: 10px;
}
.day-action-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 0.5px solid var(--border);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  background: none; border: none; width: 100%;
  border-bottom: 0.5px solid var(--border);
}
.day-action-btn:last-child { border-bottom: none; }
.day-action-btn:active { opacity: 0.6; }
.day-action-icon {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.day-action-label { font-size: 15px; font-weight: 600; color: var(--text); }
.day-action-sub   { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* ── SAVE FOOTER ── */
.bldr-save-footer {
  padding: 14px var(--page-pad);
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  border-top: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  bottom: var(--nav-h);
  z-index: 50;
}

/* ── TOAST ── */
.lf-toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--bg-dark); color: var(--volt);
  padding: 10px 20px; border-radius: 999px;
  font-size: 13px; font-weight: 600; font-family: var(--font-mono);
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 500; border: 1px solid var(--volt-border);
}
.lf-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CUSTOM EXERCISE SHEET ── */
.custom-ex-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 450;
}
.custom-ex-backdrop.show { display: block; }
.custom-ex-sheet {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card); border-radius: 20px 20px 0 0;
  z-index: 451; max-height: 92vh; overflow-y: auto;
  padding: 0 0 env(safe-area-inset-bottom,16px);
}
.custom-ex-sheet.show { display: block; }
.custom-ex-handle {
  width: 36px; height: 4px; background: var(--border-md);
  border-radius: 2px; margin: 12px auto 0;
}
.custom-ex-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border);
}
.custom-ex-header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.custom-ex-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg-dark); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 16px;
}
.custom-ex-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.custom-ex-label {
  display: block; font-size: 11px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--font-mono);
  margin-bottom: 4px;
}
.custom-ex-input, .custom-ex-select, .custom-ex-textarea {
  width: 100%; padding: 10px 12px;
  background: var(--bg-card2); border: 1px solid var(--border-md);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 15px; font-family: var(--font-body);
  outline: none; box-sizing: border-box;
}
.custom-ex-input:focus, .custom-ex-select:focus, .custom-ex-textarea:focus {
  border-color: var(--volt-dark);
}
.custom-ex-select { appearance: none; -webkit-appearance: none; }
.custom-ex-textarea { resize: none; height: 72px; line-height: 1.5; }
.custom-ex-muscles { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 2px; }
.custom-ex-muscle-chip {
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid var(--border-md);
  background: var(--bg-card2); color: var(--text-2);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.custom-ex-muscle-chip.sel {

}

}
</style>

</main>

<script>
LF.ready().then(() => LF.guard());

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let program      = null;   // program object being built
let editingDate  = null;   // 'YYYY-MM-DD' string of day being edited
let pasteMode    = false;  // true when user has copied a day
let copiedDate   = null;   // source date for copy
let libMuscle    = 'all';
let libEq        = 'all';
let cxSelectedMuscles = [];

// Viewing month on calendar
let calYear  = 0;
let calMonth = 0; // 0=Jan

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const todayStr = new Date().toISOString().slice(0,10);

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
function init() {
  // Default start date = today
  document.getElementById('prog-start').value = new Date().toISOString().slice(0,10);

  // Load existing program if editing
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || (() => {
    try {
      const v = localStorage.getItem('lf_editing_program_id');
      if (v) { localStorage.removeItem('lf_editing_program_id'); return JSON.parse(v); }
    } catch {}
    return null;
  })();

  if (id) {
    const programs = JSON.parse(localStorage.getItem('lf_programs') || '[]');
    program = programs.find(p => p.id === id);
    if (!program) { showToast('Program not found'); goBack(); return; }
    loadProgramIntoSetup();
  } else {
    program = makeBlankProgram();
  }

  buildLibraryFilters();
  initCalendarView();

  // Attach calendar tap listener exactly once
  let lastTap = 0;
  const grid = document.getElementById('cal-grid');
  grid.addEventListener('touchend', e => {
    lastTap = Date.now();
    calGridTap(e);
  }, { passive: true });
  grid.addEventListener('click', e => {
    if (Date.now() - lastTap < 400) return;
    calGridTap(e);
  });
}

// Live-update calendar when setup fields change
function onSetupChange() {
  flushSetupToProgram();
  initCalendarView();
}

function onNameInput() {
  const val = document.getElementById('prog-name').value.trim();
  document.getElementById('cal-header-title').textContent = val ? val.toUpperCase() : 'NEW PROGRAM';
}

function makeBlankProgram() {
  return {
    id:          'prog_' + Date.now(),
    name:        '',
    goal:        'hypertrophy',
    weeks:       8,
    startDate:   new Date().toISOString().slice(0,10),
    aiGenerated: false,
    savedAt:     null,
    days:        {},
  };
}

function loadProgramIntoSetup() {
  document.getElementById('prog-name').value  = program.name  || '';
  document.getElementById('prog-goal').value  = program.goal  || 'hypertrophy';
  document.getElementById('prog-weeks').value = program.weeks || 8;
  document.getElementById('prog-start').value = program.startDate || new Date().toISOString().slice(0,10);
}

function flushSetupToProgram() {
  program.name      = document.getElementById('prog-name').value.trim();
  program.goal      = document.getElementById('prog-goal').value;
  program.weeks     = parseInt(document.getElementById('prog-weeks').value);
  program.startDate = document.getElementById('prog-start').value;
}

// ══════════════════════════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════════════════════════
function programDateRange() {
  const start = new Date(program.startDate + 'T00:00:00');
  const end   = new Date(start);
  end.setDate(end.getDate() + program.weeks * 7 - 1);
  return {
    startStr: program.startDate,
    endStr:   end.toISOString().slice(0,10),
    start,
    end,
  };
}

function initCalendarView() {
  const { start } = programDateRange();
  calYear  = start.getFullYear();
  calMonth = start.getMonth();
  document.getElementById('cal-header-title').textContent =
    (program.name || 'NEW PROGRAM').toUpperCase();
  renderCalendar();
}

function renderCalendar() {
  const range = programDateRange();
  const label = MONTH_NAMES[calMonth] + ' ' + calYear;
  document.getElementById('cal-month-label').textContent = label;

  // Disable prev if this month is before start month
  const startM = new Date(range.startStr + 'T00:00:00');
  const endM   = new Date(range.endStr   + 'T00:00:00');
  const thisFirst = new Date(calYear, calMonth, 1);
  const thisLast  = new Date(calYear, calMonth + 1, 0);

  document.getElementById('cal-prev').disabled =
    thisFirst <= new Date(startM.getFullYear(), startM.getMonth(), 1);
  document.getElementById('cal-next').disabled =
    thisFirst >= new Date(endM.getFullYear(), endM.getMonth(), 1);

  // Build grid
  const firstDow = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = '';

  // Leading empty cells
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const inRange = dateStr >= range.startStr && dateStr <= range.endStr;
    const isToday = dateStr === todayStr;
    const workout = program.days[dateStr];
    const isPaste = pasteMode && inRange;

    let cls = 'cal-cell';
    if (!inRange) cls += ' out-of-range';
    if (isToday)  cls += ' is-today';
    if (workout)  cls += ' has-workout';
    if (isPaste && inRange)  cls += ' paste-target';

    const clickFn = inRange ? `data-date="${dateStr}"` : '';

    html += `
      <div class="${cls}" ${inRange ? `data-date="${dateStr}"` : ''}>
        <div class="cal-date-num">${d}</div>
        ${workout ? `<div class="cal-workout-name">${escHtml(workout.name || 'Workout')}</div>` : ''}
        ${workout ? `<div class="cal-dot"></div>` : ''}
      </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function calGridTap(e) {
  const cell = e.target.closest('[data-date]');
  if (!cell) return;
  const dateStr = cell.dataset.date;
  if (dateStr) handleDayTap(dateStr);
}

function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

// ══════════════════════════════════════════════════════════════════════
// DAY TAP LOGIC
// ══════════════════════════════════════════════════════════════════════
function handleDayTap(dateStr) {
  if (pasteMode) {
    pasteWorkout(dateStr);
    return;
  }

  const workout = program.days[dateStr];
  if (workout) {
    openDayAction(dateStr);
  } else {
    openDayEditor(dateStr);
  }
}

// ══════════════════════════════════════════════════════════════════════
// DAY ACTION SHEET (for days that already have a workout)
// ══════════════════════════════════════════════════════════════════════
let actionDate = null;

function openDayAction(dateStr) {
  actionDate = dateStr;
  const workout = program.days[dateStr];
  const d = new Date(dateStr + 'T00:00:00');
  const label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('day-action-date').textContent = label;
  document.getElementById('day-action-name').textContent = workout.name || 'Workout';
  document.getElementById('day-action-overlay').classList.add('open');
  document.getElementById('day-action-sheet').classList.add('open');
}

function closeDayAction() {
  document.getElementById('day-action-overlay').classList.remove('open');
  document.getElementById('day-action-sheet').classList.remove('open');
  // Reset clear button state
  const btn = document.getElementById('clear-btn');
  if (btn) {
    btn.dataset.confirming = '';
    btn.querySelector('.day-action-label').textContent = 'Clear this day';
    btn.querySelector('.day-action-sub').textContent   = 'Remove all exercises from this date';
  }
  actionDate = null;
}

function dayActionEdit() {
  const date = actionDate;
  closeDayAction();
  openDayEditor(date);
}

function dayActionCopy() {
  copiedDate = actionDate;
  const workout = program.days[copiedDate];
  document.getElementById('paste-banner-name').textContent = workout.name || 'Workout';
  document.getElementById('paste-banner').style.display = 'flex';
  pasteMode = true;
  closeDayAction();
  renderCalendar();
}

function dayActionClear() {
  // Show confirm state directly in the sheet — avoid confirm() which is unreliable in PWAs
  const btn = document.getElementById('clear-btn');
  if (btn.dataset.confirming === 'true') {
    delete program.days[actionDate];
    closeDayAction();
    renderCalendar();
    showToast('Day cleared');
  } else {
    btn.dataset.confirming = 'true';
    btn.querySelector('.day-action-label').textContent = 'Tap again to confirm';
    btn.querySelector('.day-action-sub').textContent   = 'This will remove all exercises';
    setTimeout(() => {
      if (btn.dataset.confirming) {
        btn.dataset.confirming = '';
        btn.querySelector('.day-action-label').textContent = 'Clear this day';
        btn.querySelector('.day-action-sub').textContent   = 'Remove all exercises from this date';
      }
    }, 3000);
  }
}

// ══════════════════════════════════════════════════════════════════════
// PASTE
// ══════════════════════════════════════════════════════════════════════
function pasteWorkout(targetDate) {
  const source = program.days[copiedDate];
  if (!source) { cancelPaste(); return; }

  // If target already has a workout, just overwrite — user chose to paste here
  program.days[targetDate] = JSON.parse(JSON.stringify(source));
  cancelPaste();
  renderCalendar();
  showToast('Workout pasted to ' + formatDateShort(targetDate));
}

function cancelPaste() {
  pasteMode  = false;
  copiedDate = null;
  document.getElementById('paste-banner').style.display = 'none';
  renderCalendar();
}

// ══════════════════════════════════════════════════════════════════════
// SCREEN 3 — DAY EDITOR
// ══════════════════════════════════════════════════════════════════════
function openDayEditor(dateStr) {
  editingDate = dateStr;

  const day = program.days[dateStr];
  document.getElementById('day-title-input').value = day ? (day.name || '') : '';

  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('day-date-label').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  showScreen('day');
  buildLibraryFilters();
  renderExList();
}

function saveDayAndBack() {
  if (editingDate) {
    const nameVal = document.getElementById('day-title-input').value.trim();
    if (!program.days[editingDate]) program.days[editingDate] = { name: '', exercises: [] };

    // If no name and no exercises, remove the day entirely (treat as rest)
    if (!nameVal && program.days[editingDate].exercises.length === 0) {
      delete program.days[editingDate];
    } else {
      program.days[editingDate].name = nameVal || 'Workout';
    }
  }
  editingDate = null;
  showScreen('main');
  renderCalendar();
}

function backToCalendar() {
  saveDayAndBack();
}

// ══════════════════════════════════════════════════════════════════════
// EXERCISE LIST
// ══════════════════════════════════════════════════════════════════════
function renderExList() {
  const day  = editingDate ? program.days[editingDate] : null;
  const list = document.getElementById('ex-list');

  if (!day || day.exercises.length === 0) {
    list.innerHTML = `
      <div style="padding:32px 0 8px;text-align:center;">
        <div style="font-size:32px;opacity:0.25;margin-bottom:8px;">🏋️</div>
        <div style="font-size:14px;color:var(--text-3);font-weight:500;">No exercises yet</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:4px;">Tap "Add exercise" below</div>
      </div>`;
    return;
  }

  list.innerHTML = day.exercises.map((ex, ei) => `
    <div class="bldr-ex-card" id="ex-card-${ei}">
      <div class="bldr-ex-card-header">
        <span class="bldr-ex-drag" title="Drag to reorder">⠿</span>
        <div style="flex:1;min-width:0;">
          <div class="bldr-ex-name">${escHtml(ex.name)}</div>
          <div class="bldr-ex-muscle">${(ex.muscles || []).slice(0,2).join(' · ')}</div>
        </div>
        <button class="bldr-ex-del" onclick="removeExercise(${ei})" aria-label="Remove">✕</button>
      </div>
      <div class="bldr-ex-params">
        <div class="bldr-param">
          <div class="bldr-param-label">Sets</div>
          <input class="bldr-param-input" type="number"
            value="${ex.sets}" min="1" max="20"
            onchange="updateExParam(${ei},'sets',this.value)">
          <div class="bldr-param-unit">sets</div>
        </div>
        <div class="bldr-param">
          <div class="bldr-param-label">Reps</div>
          <input class="bldr-param-input" type="number"
            value="${ex.reps}" min="1" max="100"
            onchange="updateExParam(${ei},'reps',this.value)">
          <div class="bldr-param-unit">reps</div>
        </div>
        <div class="bldr-param">
          <div class="bldr-param-label">Rest</div>
          <input class="bldr-param-input" type="number"
            value="${ex.restSec}" min="0" max="600" step="15"
            onchange="updateExParam(${ei},'restSec',this.value)">
          <div class="bldr-param-unit">sec</div>
        </div>
      </div>
    </div>`).join('');

  initDrag();
}

function updateExParam(ei, key, val) {
  const day = program.days[editingDate];
  if (!day || !day.exercises[ei]) return;
  day.exercises[ei][key] = parseInt(val) || 0;
}

function removeExercise(ei) {
  program.days[editingDate].exercises.splice(ei, 1);
  renderExList();
}

// ══════════════════════════════════════════════════════════════════════
// DRAG TO REORDER
// ══════════════════════════════════════════════════════════════════════
function initDrag() {
  const list = document.getElementById('ex-list');
  let dragEl = null, startY = 0, startIdx = -1, curIdx = -1;

  list.querySelectorAll('.bldr-ex-drag').forEach((handle, i) => {
    handle.addEventListener('touchstart', e => {
      dragEl   = handle.closest('.bldr-ex-card');
      startIdx = curIdx = i;
      startY   = e.touches[0].clientY;
      dragEl.style.opacity = '0.7';
      dragEl.style.zIndex  = '10';
      e.preventDefault();
    }, { passive: false });
  });

  list.addEventListener('touchmove', e => {
    if (!dragEl) return;
    const dy     = e.touches[0].clientY - startY;
    const cards  = [...list.querySelectorAll('.bldr-ex-card')];
    const cardH  = dragEl.offsetHeight + 10;
    const newIdx = Math.max(0, Math.min(cards.length - 1, startIdx + Math.round(dy / cardH)));
    if (newIdx !== curIdx) {
      const exes  = program.days[editingDate].exercises;
      const moved = exes.splice(curIdx, 1)[0];
      exes.splice(newIdx, 0, moved);
      curIdx = newIdx;
      renderExList();
      initDrag();
    }
    e.preventDefault();
  }, { passive: false });

  list.addEventListener('touchend', () => {
    if (dragEl) {
      dragEl.style.opacity = '';
      dragEl.style.zIndex  = '';
      dragEl = null;
    }
  });
}

// ══════════════════════════════════════════════════════════════════════
// LIBRARY SHEET
// ══════════════════════════════════════════════════════════════════════
const MUSCLE_FILTERS = [
  { id:'all',       label:'All' },
  { id:'chest',     label:'Chest' },
  { id:'back',      label:'Back' },
  { id:'shoulders', label:'Shoulders' },
  { id:'biceps',    label:'Biceps' },
  { id:'triceps',   label:'Triceps' },
  { id:'legs',      label:'Legs' },
  { id:'core',      label:'Core' },
  { id:'fullbody',  label:'Full body' },
  { id:'cardio',    label:'Cardio' },
];
const EQ_FILTERS = [
  { id:'all',  label:'All equipment' },
  { id:'db',   label:'Dumbbells' },
  { id:'bb',   label:'Barbell' },
  { id:'mc',   label:'Machine' },
  { id:'bw',   label:'Bodyweight' },
  { id:'kb',   label:'Kettlebell' },
  { id:'band', label:'Bands' },
  { id:'cd',   label:'Cable' },
];

function buildLibraryFilters() {
  const mRow = document.getElementById('lib-muscle-row');
  const eRow = document.getElementById('lib-eq-row');
  if (!mRow || !eRow) return;
  mRow.innerHTML = MUSCLE_FILTERS.map(f =>
    `<button class="lib-filter-chip${f.id===libMuscle?' active':''}"
             onclick="setLibMuscle('${f.id}')">${f.label}</button>`
  ).join('');
  eRow.innerHTML = EQ_FILTERS.map(f =>
    `<button class="lib-eq-chip${f.id===libEq?' active':''}"
             onclick="setLibEq('${f.id}')">${f.label}</button>`
  ).join('');
}

function setLibMuscle(val) { libMuscle = val; buildLibraryFilters(); renderLibrary(); }
function setLibEq(val)     { libEq     = val; buildLibraryFilters(); renderLibrary(); }

function openLibrary() {
  document.getElementById('lib-sheet').classList.add('open');
  document.getElementById('lib-backdrop').classList.add('open');
  document.getElementById('lib-search').value = '';
  renderLibrary();
  setTimeout(() => document.getElementById('lib-search').focus(), 350);
}

function closeLibrary() {
  document.getElementById('lib-sheet').classList.remove('open');
  document.getElementById('lib-backdrop').classList.remove('open');
}

function renderLibrary() {
  const q       = (document.getElementById('lib-search').value || '').toLowerCase().trim();
  const day     = program.days[editingDate];
  const addedIds = new Set((day?.exercises || []).map(e => e.id));
  const customs  = getCustomExercises();
  let exercises  = [...customs, ...(LAROFIT_EXERCISES || [])];

  if (libMuscle !== 'all') exercises = exercises.filter(e => e.category === libMuscle);
  if (libEq     !== 'all') exercises = exercises.filter(e => e.eq === libEq);
  if (q) {
    exercises = exercises.filter(e =>
      e.name.toLowerCase().includes(q) ||
      (e.muscles || []).some(m => m.toLowerCase().includes(q))
    );
  }

  const EQ_ICONS = { db:'🏋️', bb:'🏗️', mc:'⚙️', bw:'🤸', kb:'🔔', band:'🎽', cd:'🔗' };
  const isCustom = id => id && id.startsWith('cx-');

  document.getElementById('lib-results').innerHTML = exercises.length === 0
    ? `<div class="lib-empty">No exercises found.<br>Try a different search or filter.</div>`
    : exercises.map(ex => {
        const added = addedIds.has(ex.id);
        return `
          <div class="lib-ex-row${added?' already-added':''}" onclick="addExercise('${ex.id}')">
            <div class="lib-ex-icon">${EQ_ICONS[ex.eq] || '🏋️'}</div>
            <div class="lib-ex-body">
              <div class="lib-ex-name">${escHtml(ex.name)}${isCustom(ex.id)?'<span class="custom-badge">CUSTOM</span>':''}</div>
              <div class="lib-ex-meta">${(ex.muscles||[]).slice(0,2).join(' · ')}</div>
            </div>
            <div class="lib-ex-add">${added ? '✓' : '+'}</div>
          </div>`;
      }).join('');
}

function addExercise(exId) {
  const customs  = getCustomExercises();
  const ex       = customs.find(e => e.id === exId) || (LAROFIT_EXERCISES || []).find(e => e.id === exId);
  if (!ex) return;

  // Lazily create the day object only when first exercise is added
  if (!program.days[editingDate]) {
    program.days[editingDate] = { name: '', exercises: [] };
  }
  const day = program.days[editingDate];
  if (!day) return;

  const existing = day.exercises.findIndex(e => e.id === exId);
  if (existing >= 0) {
    day.exercises.splice(existing, 1);
    renderLibrary(); renderExList(); return;
  }

  day.exercises.push({ id: ex.id, name: ex.name, muscles: ex.muscles || [], sets: 3, reps: 10, restSec: 60 });
  renderLibrary();
  renderExList();
  showToast(ex.name + ' added');
}

// ══════════════════════════════════════════════════════════════════════
// SAVE PROGRAM
// ══════════════════════════════════════════════════════════════════════
function saveProgram() {
  flushSetupToProgram();

  if (!program.name) {
    showToast('Give your program a name first');
    document.getElementById('prog-name').focus();
    return;
  }

  program.savedAt = new Date().toISOString();

  const programs = JSON.parse(localStorage.getItem('lf_programs') || '[]');
  const idx      = programs.findIndex(p => p.id === program.id);
  if (idx >= 0) programs[idx] = program;
  else          programs.push(program);
  localStorage.setItem('lf_programs', JSON.stringify(programs));

  showToast('Program saved ✓');
  setTimeout(() => { window.location.href = 'programs.html'; }, 900);
}

// ══════════════════════════════════════════════════════════════════════
// CUSTOM EXERCISES
// ══════════════════════════════════════════════════════════════════════
function getCustomExercises() {
  try { return JSON.parse(localStorage.getItem('lf_custom_exercises') || '[]'); } catch { return []; }
}

function openCustomExSheet() {
  cxSelectedMuscles = [];
  document.getElementById('cx-name').value       = '';
  document.getElementById('cx-video').value      = '';
  document.getElementById('cx-notes').value      = '';
  document.getElementById('cx-category').value   = 'legs';
  document.getElementById('cx-eq').value         = 'bw';
  document.getElementById('cx-type').value       = 'strength';
  document.getElementById('cx-difficulty').value = 'intermediate';
  buildMuscleChips();
  document.getElementById('custom-ex-backdrop').classList.add('show');
  document.getElementById('custom-ex-sheet').classList.add('show');
  setTimeout(() => document.getElementById('cx-name').focus(), 300);
}

function closeCustomExSheet() {
  document.getElementById('custom-ex-backdrop').classList.remove('show');
  document.getElementById('custom-ex-sheet').classList.remove('show');
}

function buildMuscleChips() {
  const el = document.getElementById('cx-muscles');
  if (!el) return;
  el.innerHTML = MUSCLES_ALL.map(m => `
    <div class="custom-ex-muscle-chip${cxSelectedMuscles.includes(m)?' sel':''}"
         onclick="toggleMuscleChip(this,'${m}')">
      ${m}
    </div>`).join('');
}

function toggleMuscleChip(el, muscle) {
  const idx = cxSelectedMuscles.indexOf(muscle);
  if (idx >= 0) { cxSelectedMuscles.splice(idx, 1); el.classList.remove('sel'); }
  else          { cxSelectedMuscles.push(muscle);   el.classList.add('sel'); }
}

function saveCustomExercise() {
  const name = document.getElementById('cx-name').value.trim();
  if (!name) { showToast('Exercise name is required'); return; }

  const ex = {
    id:         'cx-' + Date.now(),
    name,
    category:   document.getElementById('cx-category').value,
    eq:         document.getElementById('cx-eq').value,
    type:       document.getElementById('cx-type').value,
    difficulty: document.getElementById('cx-difficulty').value,
    muscles:    [...cxSelectedMuscles],
    video:      document.getElementById('cx-video').value.trim(),
    notes:      document.getElementById('cx-notes').value.trim(),
    custom:     true,
  };

  const arr = getCustomExercises();
  arr.push(ex);
  localStorage.setItem('lf_custom_exercises', JSON.stringify(arr));
  closeCustomExSheet();
  addExercise(ex.id);
  renderLibrary();
  showToast(ex.name + ' created and added');
}

// ══════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── RUN ──
document.addEventListener('DOMContentLoaded', init);
</script>
